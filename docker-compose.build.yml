version: '3.8'

# Docker Compose configuration for building BTCDecoded ecosystem
# Usage: docker-compose -f docker-compose.build.yml build

services:
  # Build blvm-consensus (library only)
  blvm-consensus:
    build:
      context: ../blvm-consensus
      dockerfile: Dockerfile
    image: btcdecoded/blvm-consensus:latest
    
  # Build blvm-protocol (library only, depends on blvm-consensus)
  blvm-protocol:
    build:
      context: ../blvm-protocol
      dockerfile: Dockerfile
    image: btcdecoded/blvm-protocol:latest
    depends_on:
      - blvm-consensus
    
  # Build blvm-node (binary)
  blvm-node:
    build:
      context: ../blvm-node
      dockerfile: Dockerfile
    image: btcdecoded/blvm-node:latest
    depends_on:
      - blvm-consensus
      - blvm-protocol
    
  # Build blvm-sdk (CLI binaries)
  blvm-sdk:
    build:
      context: ../blvm-sdk
      dockerfile: Dockerfile
    image: btcdecoded/blvm-sdk:latest
    
  # Build blvm-commons (binaries)
  blvm-commons:
    build:
      context: ../blvm-commons
      dockerfile: Dockerfile
    image: btcdecoded/blvm-commons:latest
    depends_on:
      - blvm-sdk

