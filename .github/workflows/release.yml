name: Official Release

on:
  # DISABLED: Only ci.yml runs automatically
  # push:
  #   branches:
  #     - main
  #   paths-ignore:
  #     - '**.md'
  #     - '.github/**'
  #     - 'docs/**'
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Version tag for release (e.g., v0.1.0). If not provided, auto-increments from versions.toml (see version_bump)'
        required: false
        type: string
      version_bump:
        description: 'When version_tag is empty: which semver field to increment (source of truth: blvm entry in versions.toml)'
        required: false
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
      platform:
        description: 'Platform to build for (linux, windows, or both)'
        required: false
        default: 'both'
        type: string
      skip_tagging:
        description: 'Skip creating git tags (for testing)'
        required: false
        default: false
        type: boolean
      use_latest_crates:
        description: 'Use latest crates.io versions instead of publishing new ones (for nightly builds)'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  actions: read

jobs:
  determine-version:
    name: Determine Release Version
    runs-on: [self-hosted, Linux, X64, builds]
    outputs:
      version_tag: ${{ steps.version.outputs.version_tag }}
      version_number: ${{ steps.version.outputs.version_number }}
      release_set_id: ${{ steps.version.outputs.release_set_id }}
      auto_bumped: ${{ steps.version.outputs.auto_bumped }}
      previous_version: ${{ steps.version.outputs.previous_version }}
    steps:
      - name: Checkout blvm
        uses: actions/checkout@v4
        with:
          repository: BTCDecoded/blvm
          path: blvm
          ref: main
          fetch-depth: 0
      
      - name: Strip [patch.crates-io] for crates.io-only CI
        uses: BTCDecoded/rust-ci/strip-patch-crates-io@main
        with:
          working-directory: blvm
      
      - name: Determine version
        id: version
        run: |
          # If version_tag provided via workflow_dispatch, use it
          if [ -n "${{ inputs.version_tag }}" ]; then
            VERSION_TAG="${{ inputs.version_tag }}"
            # Extract version number (remove 'v' prefix if present)
            VERSION_NUMBER="${VERSION_TAG#v}"
            echo "version_tag=${VERSION_TAG}" >> $GITHUB_OUTPUT
            echo "version_number=${VERSION_NUMBER}" >> $GITHUB_OUTPUT
            echo "auto_bumped=false" >> $GITHUB_OUTPUT
            echo "previous_version=" >> $GITHUB_OUTPUT
            echo "Using provided version: ${VERSION_TAG}"
            exit 0
          fi
          
          # Otherwise, read from versions.toml (blvm entry = release-set anchor for the node binary)
          VERSIONS_FILE="blvm/versions.toml"
          
          if [ ! -f "$VERSIONS_FILE" ]; then
            echo "ERROR: versions.toml not found"
            exit 1
          fi
          
          # Format: blvm = { version = "0.1.0", git_tag = "v0.1.0", ... }
          CURRENT_VERSION=$(grep '^blvm = ' "$VERSIONS_FILE" | sed -E 's/.*version = "([^"]+)".*/\1/')
          
          if [ -z "$CURRENT_VERSION" ]; then
            echo "ERROR: Could not read blvm version from versions.toml"
            exit 1
          fi
          
          echo "Current blvm release-set version from versions.toml: ${CURRENT_VERSION}"
          
          KIND="${{ inputs.version_bump }}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"
          case "${KIND:-patch}" in
            patch)
              NEW_PATCH=$((PATCH + 1))
              NEW_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"
              ;;
            minor)
              NEW_MINOR=$((MINOR + 1))
              NEW_VERSION="${MAJOR}.${NEW_MINOR}.0"
              ;;
            major)
              NEW_VERSION="$((MAJOR + 1)).0.0"
              ;;
            *)
              echo "ERROR: invalid version_bump"
              exit 1
              ;;
          esac
          VERSION_TAG="v${NEW_VERSION}"
          
          # Generate release set ID (e.g., set-2025-01A)
          DATE=$(date +%Y-%m)
          MONTH_ABBR=$(date +%b | tr '[:upper:]' '[:lower:]')
          RELEASE_SET_ID="set-$(date +%Y-%m%d)"
          
          echo "version_tag=${VERSION_TAG}" >> $GITHUB_OUTPUT
          echo "version_number=${NEW_VERSION}" >> $GITHUB_OUTPUT
          echo "release_set_id=${RELEASE_SET_ID}" >> $GITHUB_OUTPUT
          echo "auto_bumped=true" >> $GITHUB_OUTPUT
          echo "previous_version=${CURRENT_VERSION}" >> $GITHUB_OUTPUT
          echo "Auto-incremented version: ${CURRENT_VERSION} -> ${NEW_VERSION} (${VERSION_TAG})"
          echo "Release set ID: ${RELEASE_SET_ID}"

  release:
    name: Create Release ${{ needs.determine-version.outputs.version_tag }}
    needs: determine-version
    runs-on: [self-hosted, Linux, X64, builds]
    timeout-minutes: 240
    steps:
      - name: Checkout blvm
        uses: actions/checkout@v4
        with:
          repository: BTCDecoded/blvm
          path: blvm
          ref: main
          fetch-depth: 0
      
      - name: Strip [patch.crates-io] for crates.io-only CI
        uses: BTCDecoded/rust-ci/strip-patch-crates-io@main
        with:
          working-directory: blvm

      # When version_tag was omitted, determine-version computed the next semver but the
      # checkout still has the previous versions.toml / Cargo.toml — apply NEW before building.
      - name: Apply auto-bumped version to versions.toml and Cargo.toml
        if: ${{ needs.determine-version.outputs.auto_bumped == 'true' }}
        run: |
          set -euo pipefail
          OLD="${{ needs.determine-version.outputs.previous_version }}"
          NEW="${{ needs.determine-version.outputs.version_number }}"
          if [ -z "$OLD" ] || [ -z "$NEW" ]; then
            echo "ERROR: missing previous or new version"
            exit 1
          fi
          python3 - <<'PY'
          import pathlib, os
          old, new = os.environ["OLD"], os.environ["NEW"]
          root = pathlib.Path("blvm")
          vpath = root / "versions.toml"
          cpath = root / "Cargo.toml"
          t = vpath.read_text(encoding="utf-8")
          if "[metadata]" in t:
              head, rest = t.split("[metadata]", 1)
              head = head.replace(old, new)
              t = head + "[metadata]" + rest
          else:
              t = t.replace(old, new)
          vpath.write_text(t, encoding="utf-8")
          ct = cpath.read_text(encoding="utf-8")
          import re
          ct = re.sub(r'(?m)^(version\s*=\s*)\"[^\"]+\"', rf'\1"{new}"', ct, count=1)
          cpath.write_text(ct, encoding="utf-8")
          print(f"Applied {old} -> {new} in versions.toml (before [metadata]) and Cargo.toml [package].version")
          PY
        env:
          OLD: ${{ needs.determine-version.outputs.previous_version }}
          NEW: ${{ needs.determine-version.outputs.version_number }}
      
      - name: Setup Rust toolchain
        uses: BTCDecoded/rust-ci/install-rust-toolchain@main
        with:
          toolchain: stable
          components: rustfmt clippy

      - name: Check for performance tools and configure environment
        run: |
          echo "Checking for performance optimization tools..."
          RUSTFLAGS_BASE="-C debuginfo=0"
          if command -v mold &> /dev/null; then
            echo "✅ mold linker found"
            echo "RUSTFLAGS=${RUSTFLAGS_BASE} -C link-arg=-fuse-ld=mold" >> $GITHUB_ENV
          else
            echo "⚠️  mold linker not found (install for faster linking)"
            echo "RUSTFLAGS=${RUSTFLAGS_BASE}" >> $GITHUB_ENV
          fi
          if command -v ccache &> /dev/null; then
            echo "✅ ccache found"
            echo "CC=ccache gcc" >> $GITHUB_ENV
            echo "CXX=ccache g++" >> $GITHUB_ENV
          else
            echo "⚠️  ccache not found (install for faster C dependency builds)"
            echo "CC=" >> $GITHUB_ENV
            echo "CXX=" >> $GITHUB_ENV
          fi
      
      - name: Fix corrupted cargo dependencies and config
        run: |
          rustup update stable || true
          if [ "${CARGO_BUILD_JOBS:-}" = "0" ]; then
            echo "⚠️  CARGO_BUILD_JOBS is set to 0, unsetting it..."
            unset CARGO_BUILD_JOBS
            if [ -f "$GITHUB_ENV" ]; then
              sed -i '/^CARGO_BUILD_JOBS=/d' "$GITHUB_ENV" || true
            fi
          fi
          if [ -f ~/.cargo/config.toml ]; then
            if grep -qE "jobs\s*=\s*0" ~/.cargo/config.toml 2>/dev/null; then
              echo "⚠️  Found jobs=0 in ~/.cargo/config.toml, removing it..."
              sed -i -E '/jobs\s*=\s*0/d' ~/.cargo/config.toml || true
            fi
          fi
          find . -name "config.toml" -path "*/.cargo/*" 2>/dev/null | while read file; do
            if grep -qE "jobs\s*=\s*0" "$file" 2>/dev/null; then
              echo "⚠️  Found jobs=0 in $file, removing it..."
              sed -i -E '/jobs\s*=\s*0/d' "$file" || true
            fi
          done
          if [ "${RUSTC_WRAPPER:-}" = "sccache" ]; then
            if [ -f ~/.cargo/config.toml ]; then
              if grep -q "incremental" ~/.cargo/config.toml 2>/dev/null; then
                echo "⚠️  Removing incremental from ~/.cargo/config.toml (sccache requirement)"
                sed -i '/\[build\]/,/^\[/ { /incremental/d; }' ~/.cargo/config.toml || true
                sed -i '/^incremental/d' ~/.cargo/config.toml || true
              fi
            fi
            find . -name "config.toml" -path "*/.cargo/*" 2>/dev/null | while read file; do
              if grep -q "incremental" "$file" 2>/dev/null; then
                echo "⚠️  Removing incremental from $file (sccache requirement)"
                sed -i '/incremental/d' "$file" || true
              fi
            done
            unset CARGO_INCREMENTAL || true
          fi
      
      - name: Checkout all repos at main
        run: |
          chmod +x blvm/scripts/*.sh
          blvm/scripts/setup-build-env.sh
        env:
          GITHUB_TOKEN: ${{ secrets.REPO_ACCESS_TOKEN }}
          PARENT_DIR: ${{ github.workspace }}
      
      - name: Publish dependencies to crates.io
        if: ${{ !inputs.use_latest_crates }}
        run: |
          VERSION_NUMBER="${{ needs.determine-version.outputs.version_number }}"
          PARENT_DIR="${GITHUB_WORKSPACE}"
          
          # Publishing order: dependencies first, then dependents
          # blvm-sdk depends on blvm-node (composition framework), so must come after
          PUBLISH_ORDER=("blvm-consensus" "blvm-protocol" "blvm-node" "blvm-sdk")
          
          echo "=== Publishing Dependencies to crates.io ==="
          echo "Version: ${VERSION_NUMBER}"
          
          # Check for crates.io token
          if [ -z "${CARGO_REGISTRY_TOKEN:-}" ]; then
            echo "⚠️  CARGO_REGISTRY_TOKEN not set, skipping crate publication"
            echo "   Set CARGO_REGISTRY_TOKEN secret to enable crate publishing"
            exit 0
          fi
          
          # Configure cargo for crates.io
          cargo login "${CARGO_REGISTRY_TOKEN}"
          set -o pipefail
          PUBLISH_FAILED=0
          
          for repo in "${PUBLISH_ORDER[@]}"; do
            REPO_PATH="${PARENT_DIR}/${repo}"
            if [ ! -d "$REPO_PATH" ]; then
              echo "⚠️  Repository not found: ${repo}, skipping..."
              continue
            fi
            
            echo "=========================================="
            echo "Publishing ${repo} v${VERSION_NUMBER}..."
            echo "=========================================="
            cd "$REPO_PATH"
            
            # Update dependencies to use published crates before publishing
            # blvm-sdk depends on blvm-node (composition framework)
            if [ "$repo" = "blvm-sdk" ]; then
              echo "Updating blvm-sdk dependencies to use published crates..."
              if [ -f "Cargo.toml" ]; then
                # Update blvm-node dependency to use published version
                sed -i 's|blvm-node = { path = "\.\./blvm-node"|blvm-node = "='"${VERSION_NUMBER}"'"|g' Cargo.toml
                echo "✅ Updated blvm-sdk/Cargo.toml to use published blvm-node"
              fi
            fi
            
            # Publish to crates.io
            if cargo publish --dry-run 2>&1 | tee /tmp/${repo}-publish-dry-run.log; then
              echo "✅ Dry-run successful for ${repo}"
              
              # Check if version already exists
              CRATE_NAME=$(grep -E '^name = ' Cargo.toml | sed -E 's/^name = "([^"]+)".*/\1/')
              if cargo search "$CRATE_NAME" --limit 1 2>/dev/null | grep -q "v${VERSION_NUMBER}"; then
                echo "⚠️  Version ${VERSION_NUMBER} already published for ${repo}, skipping..."
              else
                echo "Publishing ${repo} v${VERSION_NUMBER} to crates.io..."
                if cargo publish --token "${CARGO_REGISTRY_TOKEN}" 2>&1 | tee /tmp/${repo}-publish.log; then
                  echo "✅ Successfully published ${repo} v${VERSION_NUMBER}"
                  # Wait a bit for crates.io to index
                  echo "Waiting 30 seconds for crates.io to index..."
                  sleep 30
                else
                  echo "❌ Failed to publish ${repo}"
                  echo "Publish log (last 50 lines):"
                  tail -50 /tmp/${repo}-publish.log || true
                  PUBLISH_FAILED=1
                fi
              fi
            else
              echo "❌ Dry-run failed for ${repo}"
              echo "Dry-run log (last 50 lines):"
              tail -50 /tmp/${repo}-publish-dry-run.log || true
              PUBLISH_FAILED=1
            fi
            
            cd - > /dev/null
          done
          
          echo "=== Crate Publishing Complete ==="
          if [ "$PUBLISH_FAILED" -ne 0 ]; then
            echo "::error::One or more crates failed cargo publish dry-run or publish; fix errors and re-run."
            exit 1
          fi
        env:
          PARENT_DIR: ${{ github.workspace }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v1-rust-release"
          cache-all-crates: true
          save-if: ${{ github.ref == 'refs/heads/main' }}
      
      - name: Install Windows target and toolchain for cross-compilation
        if: ${{ inputs.platform == 'windows' || inputs.platform == 'both' || (github.event_name == 'push' && (inputs.platform == '' || inputs.platform == 'both')) }}
        run: |
          rustup target add x86_64-pc-windows-gnu
          
          if command -v apt-get &> /dev/null; then
            sudo apt-get update -qq
            sudo apt-get install -y -qq gcc-mingw-w64-x86-64 || {
              echo "⚠️  Failed to install gcc-mingw-w64-x86-64, trying alternative..."
              sudo apt-get install -y -qq mingw-w64 || true
            }
          elif command -v yum &> /dev/null; then
            sudo yum install -y -q mingw64-gcc || {
              echo "⚠️  Trying dnf..."
              sudo dnf install -y -q mingw64-gcc || true
            }
          elif command -v pacman &> /dev/null; then
            sudo pacman -S --noconfirm mingw-w64-gcc || true
          fi
          
          if command -v x86_64-w64-mingw32-gcc &> /dev/null || [ -f /usr/bin/x86_64-w64-mingw32-gcc ]; then
            MINGW_GCC=$(command -v x86_64-w64-mingw32-gcc 2>/dev/null || echo "/usr/bin/x86_64-w64-mingw32-gcc")
            if [ -x "$MINGW_GCC" ]; then
              echo "✅ MinGW-w64 GCC found: $($MINGW_GCC --version | head -n1)"
            fi
          fi
          
          mkdir -p ~/.cargo
          if [ -f ~/.cargo/config.toml ] && grep -q "\[target.x86_64-pc-windows-gnu\]" ~/.cargo/config.toml; then
            echo "⚠️  Windows target config already exists, skipping..."
          else
            {
              echo '[target.x86_64-pc-windows-gnu]'
              echo 'linker = "x86_64-w64-mingw32-gcc"'
              echo 'ar = "x86_64-w64-mingw32-ar"'
            } >> ~/.cargo/config.toml
            echo "✅ Added Windows target configuration"
          fi
      
      - name: Get latest crates.io versions
        if: ${{ inputs.use_latest_crates }}
        id: latest-versions
        run: |
          echo "=== Getting latest versions from crates.io ==="
          
          # Get latest versions from crates.io
          CONSENSUS_VER=$(cargo search blvm-consensus --limit 1 2>/dev/null | head -1 | sed -E 's/^blvm-consensus = "([^"]+)".*/\1/' || echo "0.1.0")
          PROTOCOL_VER=$(cargo search blvm-protocol --limit 1 2>/dev/null | head -1 | sed -E 's/^blvm-protocol = "([^"]+)".*/\1/' || echo "0.1.0")
          NODE_VER=$(cargo search blvm-node --limit 1 2>/dev/null | head -1 | sed -E 's/^blvm-node = "([^"]+)".*/\1/' || echo "0.1.0")
          SDK_VER=$(cargo search blvm-sdk --limit 1 2>/dev/null | head -1 | sed -E 's/^blvm-sdk = "([^"]+)".*/\1/' || echo "0.1.0")
          
          echo "consensus=${CONSENSUS_VER}" >> $GITHUB_OUTPUT
          echo "protocol=${PROTOCOL_VER}" >> $GITHUB_OUTPUT
          echo "node=${NODE_VER}" >> $GITHUB_OUTPUT
          echo "sdk=${SDK_VER}" >> $GITHUB_OUTPUT
          
          echo "Latest crates.io versions:"
          echo "  Consensus: ${CONSENSUS_VER}"
          echo "  Protocol: ${PROTOCOL_VER}"
          echo "  Node: ${NODE_VER}"
          echo "  SDK: ${SDK_VER}"
      
      - name: Update Cargo.toml to use published crates
        run: |
          if [ "${{ inputs.use_latest_crates }}" = "true" ]; then
            VERSION_NUMBER="${{ steps.latest-versions.outputs.consensus }}"
            PROTOCOL_VER="${{ steps.latest-versions.outputs.protocol }}"
            NODE_VER="${{ steps.latest-versions.outputs.node }}"
            SDK_VER="${{ steps.latest-versions.outputs.sdk }}"
            echo "=== Updating Cargo.toml to use latest crates.io versions ==="
          else
          VERSION_NUMBER="${{ needs.determine-version.outputs.version_number }}"
            PROTOCOL_VER="${VERSION_NUMBER}"
            NODE_VER="${VERSION_NUMBER}"
            SDK_VER="${VERSION_NUMBER}"
            echo "=== Updating Cargo.toml to use published crates ==="
            echo "Version: ${VERSION_NUMBER}"
          fi
          
          PARENT_DIR="${GITHUB_WORKSPACE}"
          
          # Update blvm-protocol to use published blvm-consensus
          if [ -f "${PARENT_DIR}/blvm-protocol/Cargo.toml" ]; then
            echo "Updating blvm-protocol/Cargo.toml..."
            sed -i 's|blvm-consensus = { path = "\.\./blvm-consensus"|blvm-consensus = "='"${VERSION_NUMBER}"'"|g' "${PARENT_DIR}/blvm-protocol/Cargo.toml"
          fi
          
          # Update blvm-node to use published blvm-protocol
          if [ -f "${PARENT_DIR}/blvm-node/Cargo.toml" ]; then
            echo "Updating blvm-node/Cargo.toml..."
            sed -i 's|blvm-protocol = { path = "\.\./blvm-protocol"|blvm-protocol = "='"${PROTOCOL_VER}"'"|g' "${PARENT_DIR}/blvm-node/Cargo.toml"
          fi
          
          # Update blvm to use published blvm-node
          if [ -f "${PARENT_DIR}/blvm/Cargo.toml" ]; then
            echo "Updating blvm/Cargo.toml..."
            sed -i 's|blvm-node = { path = "\.\./blvm-node"|blvm-node = "='"${NODE_VER}"'"|g' "${PARENT_DIR}/blvm/Cargo.toml"
          fi
          
          # Update blvm-sdk to use published blvm-node (for composition framework)
          if [ -f "${PARENT_DIR}/blvm-sdk/Cargo.toml" ]; then
            echo "Updating blvm-sdk/Cargo.toml..."
            sed -i 's|blvm-node = { path = "\.\./blvm-node"|blvm-node = "='"${NODE_VER}"'"|g' "${PARENT_DIR}/blvm-sdk/Cargo.toml"
          fi
          
          # Update blvm-commons to use published blvm-sdk and blvm-protocol
          if [ -f "${PARENT_DIR}/blvm-commons/Cargo.toml" ]; then
            echo "Updating blvm-commons/Cargo.toml..."
            # Update blvm-sdk dependency
            sed -i 's|blvm-sdk = { path = "\.\./\.\./blvm-sdk"|blvm-sdk = "='"${VERSION_NUMBER}"'"|g' "${PARENT_DIR}/blvm-commons/Cargo.toml"
            # Update blvm-protocol dependency
            sed -i 's|blvm-protocol = { path = "\.\./\.\./blvm-protocol"|blvm-protocol = "='"${VERSION_NUMBER}"'"|g' "${PARENT_DIR}/blvm-commons/Cargo.toml"
          fi
          
          echo "✅ Cargo.toml files updated to use published crates"
        env:
          PARENT_DIR: ${{ github.workspace }}
      
      - name: Build base variant (Linux) - Optimized (using published crates)
        if: ${{ inputs.platform == 'linux' || inputs.platform == 'both' || (github.event_name == 'push' && (inputs.platform == '' || inputs.platform == 'both')) }}
        run: |
          if [ "${CARGO_BUILD_JOBS:-}" = "0" ]; then
            echo "⚠️  CARGO_BUILD_JOBS is set to 0, unsetting it..."
            unset CARGO_BUILD_JOBS
          fi
          
          echo "=== Building final binaries using published crates ==="
          echo "Dependencies (blvm-consensus, blvm-protocol, blvm-node) are already published"
          echo "Building only: blvm, blvm-sdk, blvm-commons"
          
          PARENT_DIR="${GITHUB_WORKSPACE}"
          RUSTFLAGS="${RUSTFLAGS:-} -C debuginfo=0"
          
          # Build blvm (uses published blvm-node)
          echo "Building blvm (base variant)..."
          cd "${PARENT_DIR}/blvm"
          cargo build --release --locked --features production
          
          # Build blvm-sdk binaries (uses published blvm-node)
          echo "Building blvm-sdk binaries..."
          cd "${PARENT_DIR}/blvm-sdk"
          cargo build --release --locked --bins
          
          # Build blvm-commons (uses published blvm-sdk and blvm-protocol)
          echo "Building blvm-commons..."
          cd "${PARENT_DIR}/blvm-commons"
          cargo build --release --locked --bins || echo "⚠️  blvm-commons build failed (optional in Phase 1)"
          
          echo "✅ Final binaries built using published crates"
          
          # Save hashes from first build for deterministic verification
          echo "Saving hashes from first build for deterministic verification..."
          cd ${{ github.workspace }}
          for repo in blvm blvm-sdk; do
            if [ -d "$repo" ] && [ -d "$repo/target/release" ]; then
              cd "$repo"
              find target/release -maxdepth 1 -type f -executable -print0 | xargs -0 sha256sum > /tmp/${repo}-build1-hashes.txt 2>/dev/null || true
              if [ -f "Cargo.lock" ]; then
                sha256sum Cargo.lock >> /tmp/${repo}-build1-hashes.txt 2>/dev/null || true
              fi
              cd - > /dev/null
            fi
          done
        env:
          PARENT_DIR: ${{ github.workspace }}
          RUSTFLAGS: "-C debuginfo=0"
      
      - name: Build experimental variant (Linux) - Optimized (using published crates)
        if: ${{ inputs.platform == 'linux' || inputs.platform == 'both' || (github.event_name == 'push' && (inputs.platform == '' || inputs.platform == 'both')) }}
        run: |
          if [ "${CARGO_BUILD_JOBS:-}" = "0" ]; then
            echo "⚠️  CARGO_BUILD_JOBS is set to 0, unsetting it..."
            unset CARGO_BUILD_JOBS
          fi
          
          echo "=== Building experimental variant using published crates ==="
          echo "Dependencies are already published, building only final binaries"
          
          PARENT_DIR="${GITHUB_WORKSPACE}"
          RUSTFLAGS="${RUSTFLAGS:-} -C debuginfo=0"
          
          # Build blvm (experimental - all features)
          echo "Building blvm (experimental variant)..."
          cd "${PARENT_DIR}/blvm"
          cargo build --release --locked --features production,utxo-commitments,ctv,dandelion,stratum-v2,bip158,sigop,iroh
          
          # Build blvm-sdk binaries
          echo "Building blvm-sdk binaries (experimental)..."
          cd "${PARENT_DIR}/blvm-sdk"
          cargo build --release --locked --bins --all-features
          
          # Build blvm-commons
          echo "Building blvm-commons (experimental)..."
          cd "${PARENT_DIR}/blvm-commons"
          cargo build --release --locked --bins --all-features || echo "⚠️  blvm-commons build failed (optional)"
          
          echo "✅ Experimental binaries built using published crates"
        env:
          PARENT_DIR: ${{ github.workspace }}
          RUSTFLAGS: "-C debuginfo=0"
      
      - name: Build base variant (Windows cross-compile) - Optimized (using published crates)
        if: ${{ inputs.platform == 'windows' || inputs.platform == 'both' || (github.event_name == 'push' && (inputs.platform == '' || inputs.platform == 'both')) }}
        run: |
          echo "=== Building Windows binaries using published crates ==="
          echo "Dependencies are already published, building only final binaries"
          
          cd ${{ github.workspace }}
          FAILED_REPOS=()
          
          # Build blvm for Windows (uses published blvm-node)
          if [ -d "blvm" ]; then
            echo "Building blvm for Windows (base variant)..."
            cd blvm
            if cargo build --release --locked --target x86_64-pc-windows-gnu --features production; then
              echo "✅ Successfully built blvm for Windows (base)"
            else
              echo "❌ Windows build failed for blvm (base variant)"
              FAILED_REPOS+=("blvm")
            fi
            cd ..
          fi
          
          # Build blvm-sdk binaries for Windows (uses published blvm-node)
          if [ -d "blvm-sdk" ]; then
            echo "Building blvm-sdk for Windows (base variant)..."
            cd blvm-sdk
            if cargo build --release --locked --target x86_64-pc-windows-gnu --bins; then
              echo "✅ Successfully built blvm-sdk for Windows (base)"
            else
              echo "❌ Windows build failed for blvm-sdk (base variant)"
              FAILED_REPOS+=("blvm-sdk")
            fi
              cd ..
          fi
          
          if [ ${#FAILED_REPOS[@]} -gt 0 ]; then
            echo "⚠️  Some Windows builds failed: ${FAILED_REPOS[*]}"
            exit 1
          fi
        env:
          PARENT_DIR: ${{ github.workspace }}
          CARGO_INCREMENTAL: "1"
          RUSTFLAGS: "-C debuginfo=0"
      
      - name: Build experimental variant (Windows cross-compile) - Optimized (using published crates)
        if: ${{ inputs.platform == 'windows' || inputs.platform == 'both' || (github.event_name == 'push' && (inputs.platform == '' || inputs.platform == 'both')) }}
        run: |
          echo "=== Building Windows experimental binaries using published crates ==="
          echo "Dependencies are already published, building only final binaries"
          
          cd ${{ github.workspace }}
          FAILED_REPOS=()
          
          # Build blvm for Windows (experimental - all features)
          if [ -d "blvm" ]; then
            echo "Building blvm for Windows (experimental variant)..."
            cd blvm
            if cargo build --release --locked --target x86_64-pc-windows-gnu --features production,utxo-commitments,ctv,dandelion,stratum-v2,bip158,sigop,iroh; then
              echo "✅ Successfully built blvm for Windows (experimental)"
            else
              echo "❌ Windows build failed for blvm (experimental variant)"
              FAILED_REPOS+=("blvm")
            fi
            cd ..
          fi
          
          # Build blvm-sdk binaries for Windows (experimental)
          if [ -d "blvm-sdk" ]; then
            echo "Building blvm-sdk for Windows (experimental variant)..."
            cd blvm-sdk
            if cargo build --release --locked --target x86_64-pc-windows-gnu --bins --all-features; then
              echo "✅ Successfully built blvm-sdk for Windows (experimental)"
            else
              echo "❌ Windows build failed for blvm-sdk (experimental variant)"
              FAILED_REPOS+=("blvm-sdk")
            fi
            cd ..
          fi
          
          if [ ${#FAILED_REPOS[@]} -gt 0 ]; then
            echo "⚠️  Some Windows builds failed: ${FAILED_REPOS[*]}"
            exit 1
          fi
        env:
          PARENT_DIR: ${{ github.workspace }}
          CARGO_INCREMENTAL: "1"
          RUSTFLAGS: "-C debuginfo=0"
      
      - name: Verify deterministic builds (Linux base variant)
        if: ${{ inputs.platform == 'linux' || inputs.platform == 'both' || (github.event_name == 'push' && (inputs.platform == '' || inputs.platform == 'both')) }}
        continue-on-error: true
        timeout-minutes: 30
        run: |
          echo "=== Verifying Deterministic Builds (Base Variant) ==="
          
          PARENT_DIR="${GITHUB_WORKSPACE}"
          FAILED_REPOS=()
          
          for repo in blvm blvm-sdk; do
            if [ -d "${PARENT_DIR}/${repo}" ] && [ -f "/tmp/${repo}-build1-hashes.txt" ]; then
              echo "Verifying deterministic build for ${repo} (base variant)..."
              cd "${PARENT_DIR}/${repo}"
              
              cargo clean
              export CARGO_INCREMENTAL="${CARGO_INCREMENTAL:-1}"
              
              if [ "$repo" = "blvm" ] || [ "$repo" = "blvm-consensus" ] || [ "$repo" = "blvm-protocol" ] || [ "$repo" = "blvm-node" ]; then
                BUILD_CMD="cargo build --release --locked --features production"
              else
                BUILD_CMD="cargo build --release --locked"
              fi
              
              if eval "$BUILD_CMD" 2>&1 | tee /tmp/${repo}-rebuild.log; then
                find target/release -maxdepth 1 -type f -executable -print0 | xargs -0 sha256sum > /tmp/${repo}-build2-hashes.txt 2>/dev/null || true
                if [ -f "Cargo.lock" ]; then
                  sha256sum Cargo.lock >> /tmp/${repo}-build2-hashes.txt 2>/dev/null || true
                fi
                
                sort /tmp/${repo}-build1-hashes.txt > /tmp/${repo}-build1-sorted.txt 2>/dev/null || true
                sort /tmp/${repo}-build2-hashes.txt > /tmp/${repo}-build2-sorted.txt 2>/dev/null || true
                
                if diff -q /tmp/${repo}-build1-sorted.txt /tmp/${repo}-build2-sorted.txt > /dev/null 2>&1; then
                  echo "✅ ${repo} (base): Deterministic build verified - hashes match"
                else
                  echo "⚠️  WARNING: ${repo} (base): Non-deterministic build detected"
                  FAILED_REPOS+=("${repo}")
                fi
              else
                echo "⚠️  WARNING: ${repo} (base): Rebuild failed, skipping verification"
                FAILED_REPOS+=("${repo}")
              fi
              cd - > /dev/null
            fi
          done
          
          if [ ${#FAILED_REPOS[@]} -gt 0 ]; then
            echo "⚠️  WARNING: Some builds failed deterministic verification: ${FAILED_REPOS[*]}"
            echo "This should be fixed for production releases"
          else
            echo "✅ All deterministic builds verified (base variant)"
          fi
        env:
          PARENT_DIR: ${{ github.workspace }}
          RUSTFLAGS: "-C debuginfo=0"
      
      - name: Run tests
        run: |
          cd ${{ github.workspace }}
          FAILED_REPOS=()
          
          for repo in blvm-consensus blvm-protocol blvm-node blvm-sdk; do
            if [ -d "$repo" ]; then
              echo "=========================================="
              echo "Running tests in $repo..."
              echo "=========================================="
              cd "$repo"
              
              echo "Building tests for $repo..."
              if ! cargo build --release --all-features --tests 2>&1 | tee /tmp/${repo}-test-build.log; then
                echo "❌ Test compilation failed in $repo"
                tail -100 /tmp/${repo}-test-build.log || true
                FAILED_REPOS+=("$repo")
                cd ..
                continue
              fi
              
              echo "✅ Tests compiled successfully for $repo"
              echo "Running tests..."
              
              if timeout 1800 cargo test --release --all-features --lib --bins --tests -- --test-threads=1 --skip test_handle_incoming_wire_tcp_enqueues_pkgtxn 2>&1 | tee /tmp/${repo}-test_output.log; then
                echo "✅ Tests passed for $repo"
              else
                EXIT_CODE=$?
                if [ $EXIT_CODE -eq 124 ]; then
                  echo "❌ Tests timed out in $repo (exceeded 30 minutes)"
                  tail -100 /tmp/${repo}-test_output.log || true
                else
                  echo "❌ Tests failed in $repo"
                  tail -100 /tmp/${repo}-test_output.log || true
                fi
                FAILED_REPOS+=("$repo")
              fi
              cd ..
            fi
          done
          
          if [ ${#FAILED_REPOS[@]} -gt 0 ]; then
            echo ""
            echo "❌ Tests failed in the following repos: ${FAILED_REPOS[*]}"
            exit 1
          else
            echo ""
            echo "✅ All tests passed"
          fi
        env:
          PARENT_DIR: ${{ github.workspace }}
          CI: true
          GITHUB_ACTIONS: true
          RUSTFLAGS: "-C debuginfo=0"

      # Experimental builds overwrite target/release; rebuild each variant before collect.
      - name: Rebuild base variant for artifact collection
        run: |
          chmod +x blvm/scripts/rebuild-for-release.sh
          export RELEASE_PLATFORM="${{ inputs.platform }}"
          blvm/scripts/rebuild-for-release.sh base "${{ github.workspace }}"
        env:
          RUSTFLAGS: "-C debuginfo=0"
      
      - name: Collect artifacts (base variant)
        run: |
          PLATFORM_FLAG=""
          if [ "${{ inputs.platform }}" = "linux" ] || [ "${{ inputs.platform }}" = "both" ] || [ "${{ github.event_name }}" = "push" ]; then
            PLATFORM_FLAG="${PLATFORM_FLAG} linux-x86_64"
          fi
          if [ "${{ inputs.platform }}" = "windows" ] || [ "${{ inputs.platform }}" = "both" ] || [ "${{ github.event_name }}" = "push" ]; then
            PLATFORM_FLAG="${PLATFORM_FLAG} windows-x86_64"
          fi
          
          for platform in $PLATFORM_FLAG; do
            blvm/scripts/collect-artifacts.sh $platform base
          done

      - name: Rebuild experimental variant for artifact collection
        run: |
          chmod +x blvm/scripts/rebuild-for-release.sh
          export RELEASE_PLATFORM="${{ inputs.platform }}"
          blvm/scripts/rebuild-for-release.sh experimental "${{ github.workspace }}"
        env:
          RUSTFLAGS: "-C debuginfo=0"
      
      - name: Collect artifacts (experimental variant)
        run: |
          PLATFORM_FLAG=""
          if [ "${{ inputs.platform }}" = "linux" ] || [ "${{ inputs.platform }}" = "both" ] || [ "${{ github.event_name }}" = "push" ]; then
            PLATFORM_FLAG="${PLATFORM_FLAG} linux-x86_64"
          fi
          if [ "${{ inputs.platform }}" = "windows" ] || [ "${{ inputs.platform }}" = "both" ] || [ "${{ github.event_name }}" = "push" ]; then
            PLATFORM_FLAG="${PLATFORM_FLAG} windows-x86_64"
          fi
          
          for platform in $PLATFORM_FLAG; do
            blvm/scripts/collect-artifacts.sh $platform experimental
          done
      
      - name: Create release package
        run: |
          blvm/scripts/create-release.sh ${{ needs.determine-version.outputs.version_tag }}

      - name: Install Linux packaging tools
        if: ${{ inputs.platform == 'linux' || inputs.platform == 'both' }}
        run: |
          if command -v apt-get >/dev/null; then
            sudo apt-get update -qq
            sudo apt-get install -y -qq dpkg-dev xz-utils alien fakeroot || true
          fi

      - name: Package Linux distributions (deb, Arch-style tarball, optional rpm via alien)
        if: ${{ inputs.platform == 'linux' || inputs.platform == 'both' }}
        run: |
          chmod +x blvm/scripts/package-*.sh blvm/scripts/rebuild-for-release.sh
          V="${{ needs.determine-version.outputs.version_number }}"
          blvm/scripts/package-linux-releases.sh "$V" "${{ github.workspace }}"
        env:
          RUSTFLAGS: "-C debuginfo=0"
      
      - name: Verify versions
        run: |
          blvm/scripts/verify-versions.sh
      
      - name: Tag all repositories
        if: ${{ !inputs.skip_tagging }}
        run: |
          VERSION_TAG="${{ needs.determine-version.outputs.version_tag }}"
          ORG="BTCDecoded"
          REPOS=("blvm-consensus" "blvm-protocol" "blvm-node" "blvm" "blvm-sdk" "blvm-commons")
          
          for repo in "${REPOS[@]}"; do
            REPO_PATH="${PARENT_DIR}/${repo}"
            if [ -d "$REPO_PATH" ]; then
              echo "Tagging ${repo} with ${VERSION_TAG}..."
              cd "$REPO_PATH"
              
              # Check if tag already exists
              if git rev-parse "$VERSION_TAG" >/dev/null 2>&1; then
                echo "⚠️  Tag ${VERSION_TAG} already exists in ${repo}, skipping..."
              else
                # Create and push tag
                git tag -a "$VERSION_TAG" -m "Release ${VERSION_TAG}" || {
                  echo "⚠️  Failed to create tag in ${repo}"
                  continue
                }
                git push origin "$VERSION_TAG" || {
                  echo "⚠️  Failed to push tag in ${repo}"
                }
                echo "✅ Tagged ${repo} with ${VERSION_TAG}"
              fi
              cd - > /dev/null
            fi
          done
        env:
          PARENT_DIR: ${{ github.workspace }}
          GITHUB_TOKEN: ${{ secrets.REPO_ACCESS_TOKEN }}
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.determine-version.outputs.version_tag }}
          name: Bitcoin Commons ${{ needs.determine-version.outputs.version_tag }}
          body_path: blvm/artifacts/RELEASE_NOTES.md
          files: |
            blvm/artifacts/blvm-${{ needs.determine-version.outputs.version_tag }}-*.tar.gz
            blvm/artifacts/blvm-${{ needs.determine-version.outputs.version_tag }}-*.zip
            blvm/artifacts/blvm-experimental-${{ needs.determine-version.outputs.version_tag }}-*.tar.gz
            blvm/artifacts/blvm-experimental-${{ needs.determine-version.outputs.version_tag }}-*.zip
            blvm/artifacts/SHA256SUMS-blvm-*
            blvm/artifacts/SHA256SUMS-blvm-experimental-*
            blvm/artifacts/blvm_*.deb
            blvm/artifacts/blvm-experimental_*.deb
            blvm/artifacts/*.rpm
            blvm/artifacts/blvm-*-x86_64.pkg.tar.gz
            blvm/artifacts/SHA256SUMS-linux-packages.txt
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.REPO_ACCESS_TOKEN }}
