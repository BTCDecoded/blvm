name: Cleanup Runner Disk (blvm)

on:
  schedule:
    - cron: '0 3 * * 0'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (print what would be deleted, do not delete)'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  cleanup:
    name: Cleanup self-hosted runner disk
    runs-on: [self-hosted, Linux, X64, builds]
    steps:
      - name: Report disk before
        run: df -h /

      - name: Remove CI build target dirs under /tmp/gh-blvm-build
        run: |
          DRY="${{ github.event.inputs.dry_run }}"
          BASE="/tmp/gh-blvm-build"
          if [ ! -d "$BASE" ]; then
            echo "No build dirs at $BASE"
            exit 0
          fi
          echo "=== run dirs under $BASE ==="
          find "$BASE" -mindepth 1 -maxdepth 1 -type d | while read -r dir; do
            SIZE=$(du -sh "$dir" 2>/dev/null | cut -f1)
            echo "  $dir ($SIZE)"
            if [ "$DRY" != "true" ]; then
              rm -rf "$dir"
            fi
          done

      - name: Remove runner cache dirs older than 7 days
        run: |
          DRY="${{ github.event.inputs.dry_run }}"
          BASE="/tmp/runner-cache"
          if [ ! -d "$BASE" ]; then exit 0; fi
          # Layout A (current): /tmp/runner-cache/<owner>/<repo>/cargo/<key> and .../target/<key>
          find "$BASE" -mindepth 4 -maxdepth 4 -type d \( -path '*/cargo/*' -o -path '*/target/*' \) -mtime +7 2>/dev/null | while read -r dir; do
            SIZE=$(du -sh "$dir" 2>/dev/null | cut -f1)
            echo "Removing stale cache $dir ($SIZE)"
            if [ "$DRY" != "true" ]; then
              rm -rf "$dir"
            fi
          done
          # Layout B (legacy flat): /tmp/runner-cache/cargo/<key>
          if [ -d "$BASE/cargo" ]; then
            find "$BASE/cargo" -mindepth 1 -maxdepth 1 -type d -mtime +7 2>/dev/null | while read -r dir; do
              SIZE=$(du -sh "$dir" 2>/dev/null | cut -f1)
              echo "Removing stale legacy cache $dir ($SIZE)"
              if [ "$DRY" != "true" ]; then
                rm -rf "$dir"
              fi
            done
          fi
          if [ -d "$BASE/target" ]; then
            find "$BASE/target" -mindepth 1 -maxdepth 1 -type d -mtime +7 2>/dev/null | while read -r dir; do
              SIZE=$(du -sh "$dir" 2>/dev/null | cut -f1)
              echo "Removing stale legacy target cache $dir ($SIZE)"
              if [ "$DRY" != "true" ]; then
                rm -rf "$dir"
              fi
            done
          fi

      - name: Report disk after
        run: df -h /
