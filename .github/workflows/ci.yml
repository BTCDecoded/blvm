name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  release:
    types: [published]
  repository_dispatch:
    types: [build-chain, upstream-changed]
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip test execution steps'
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  actions: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: '1'
  CARGO_INCREMENTAL: '1'

jobs:
  setup:
    name: Setup
    runs-on: [self-hosted, Linux, X64, builds]
    if: |
      (github.event_name != 'push' || github.event.head_commit == null || 
       (!contains(github.event.head_commit.message, '[skip ci]') &&
        !contains(github.event.head_commit.message, '[ci skip]') &&
        !contains(github.event.head_commit.message, '[no ci]')))
    outputs:
      cache-key: ${{ steps.setup-cache.outputs.cache-key }}
      node-cache-key: ${{ steps.setup-cache.outputs.node-cache-key }}
      protocol-cache-key: ${{ steps.setup-cache.outputs.protocol-cache-key }}
      consensus-cache-key: ${{ steps.setup-cache.outputs.consensus-cache-key }}
    steps:
      - name: Disk check
        uses: BTCDecoded/rust-ci/runner-disk-guard@main

      - uses: actions/checkout@v4
      

      - name: Strip [patch.crates-io] for crates.io-only CI
        uses: BTCDecoded/rust-ci/strip-patch-crates-io@main
      - name: Checkout blvm-node dependency
        uses: actions/checkout@v4
        with:
          repository: BTCDecoded/blvm-node
          path: _temp-blvm-node
      
      - name: Checkout blvm-protocol dependency
        uses: actions/checkout@v4
        with:
          repository: BTCDecoded/blvm-protocol
          path: _temp-blvm-protocol
      
      - name: Checkout consensus
        uses: actions/checkout@v4
        with:
          repository: BTCDecoded/blvm-consensus
          path: _temp-blvm-consensus
      
      - name: Checkout blvm-spec-lock (consensus path dep)
        uses: actions/checkout@v4
        with:
          repository: BTCDecoded/blvm-spec-lock
          path: _temp-spec-lock
      
      - name: Move dependencies to parent directory
        run: |
          if [ -d "../blvm-node" ]; then rm -rf ../blvm-node; fi
          if [ -d "../blvm-protocol" ]; then rm -rf ../blvm-protocol; fi
          if [ -d "../blvm-consensus" ]; then rm -rf ../blvm-consensus; fi
          if [ -d "../blvm-spec-lock" ]; then rm -rf ../blvm-spec-lock; fi
          mv _temp-blvm-node ../blvm-node
          mv _temp-blvm-protocol ../blvm-protocol
          mv _temp-blvm-consensus ../blvm-consensus
          mv _temp-spec-lock ../blvm-spec-lock
      
      - name: Cache
        id: setup-cache
        run: |
          CACHE_ROOT="/tmp/runner-cache"
          
          # blvm commits Cargo.lock; sibling libraries use Cargo.toml only
          DEPS_KEY=$(sha256sum Cargo.lock | cut -d' ' -f1)
          NODE_DEPS_KEY=$(sha256sum ../blvm-node/Cargo.toml | cut -d' ' -f1)
          PROTOCOL_DEPS_KEY=$(sha256sum ../blvm-protocol/Cargo.toml | cut -d' ' -f1)
          CONSENSUS_DEPS_KEY=$(sha256sum ../blvm-consensus/Cargo.toml | cut -d' ' -f1)
          
          # Include toolchain version in cache key
          TOOLCHAIN=$(grep -E '^channel|rust-version' rust-toolchain.toml Cargo.toml 2>/dev/null | head -1 | sha256sum | cut -d' ' -f1 || echo "1.88.0")
          
          CACHE_KEY="${DEPS_KEY}-${TOOLCHAIN}"
          NODE_CACHE_KEY="${NODE_DEPS_KEY}-${TOOLCHAIN}"
          PROTOCOL_CACHE_KEY="${PROTOCOL_DEPS_KEY}-${TOOLCHAIN}"
          CONSENSUS_CACHE_KEY="${CONSENSUS_DEPS_KEY}-${TOOLCHAIN}"
          
          # Set up cache directories
          CARGO_CACHE_DIR="$CACHE_ROOT/cargo/$CACHE_KEY"
          TARGET_CACHE_DIR="$CACHE_ROOT/target/$CACHE_KEY"
          NODE_TARGET_DIR="$CACHE_ROOT/blvm-node-target/$NODE_CACHE_KEY"
          PROTOCOL_TARGET_DIR="$CACHE_ROOT/blvm-protocol-target/$PROTOCOL_CACHE_KEY"
          CONSENSUS_TARGET_DIR="$CACHE_ROOT/blvm-consensus-target/$CONSENSUS_CACHE_KEY"
          
          echo "CARGO_CACHE_DIR=$CARGO_CACHE_DIR" >> $GITHUB_ENV
          echo "TARGET_CACHE_DIR=$TARGET_CACHE_DIR" >> $GITHUB_ENV
          echo "NODE_TARGET_DIR=$NODE_TARGET_DIR" >> $GITHUB_ENV
          echo "PROTOCOL_TARGET_DIR=$PROTOCOL_TARGET_DIR" >> $GITHUB_ENV
          echo "CONSENSUS_TARGET_DIR=$CONSENSUS_TARGET_DIR" >> $GITHUB_ENV
          
          echo "cache-key=$CACHE_KEY" >> $GITHUB_OUTPUT
          echo "node-cache-key=$NODE_CACHE_KEY" >> $GITHUB_OUTPUT
          echo "protocol-cache-key=$PROTOCOL_CACHE_KEY" >> $GITHUB_OUTPUT
          echo "consensus-cache-key=$CONSENSUS_CACHE_KEY" >> $GITHUB_OUTPUT
          
          mkdir -p "$CARGO_CACHE_DIR"/{registry,git} "$TARGET_CACHE_DIR" "$NODE_TARGET_DIR" "$PROTOCOL_TARGET_DIR" "$CONSENSUS_TARGET_DIR"
          
          echo "  - Main: ${CACHE_KEY:0:16}..."
          echo "  - Node: ${NODE_CACHE_KEY:0:16}..."
          echo "  - Protocol: ${PROTOCOL_CACHE_KEY:0:16}..."
          echo "  - Consensus: ${CONSENSUS_CACHE_KEY:0:16}..."

      - name: Install Rust
        uses: BTCDecoded/rust-ci/install-rust-toolchain@main

  test:
    name: Test
    needs: setup
    runs-on: [self-hosted, Linux, X64, builds]
    if: |
      (github.event_name != 'push' || github.event.head_commit == null || 
       (!contains(github.event.head_commit.message, '[skip ci]') &&
        !contains(github.event.head_commit.message, '[ci skip]') &&
        !contains(github.event.head_commit.message, '[no ci]'))) &&
      ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.skip_tests != 'true' }}
    steps:
      - name: Check if tests should be skipped
        id: skip_check
        run: |
          SKIP="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.skip_tests == 'true' }}"
          if [ "$SKIP" = "true" ]; then
            echo "⚠️  Tests skipped via workflow input"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Skip tests message
        if: steps.skip_check.outputs.skip == 'true'
        run: |
          echo "✅ Test step skipped"
          exit 0
      
      - uses: actions/checkout@v4
        if: steps.skip_check.outputs.skip != 'true'
      

      - name: Strip [patch.crates-io] for crates.io-only CI
        uses: BTCDecoded/rust-ci/strip-patch-crates-io@main
      - name: Checkout blvm-node dependency
        if: steps.skip_check.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          repository: BTCDecoded/blvm-node
          path: _temp-blvm-node
      
      - name: Checkout blvm-protocol dependency
        if: steps.skip_check.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          repository: BTCDecoded/blvm-protocol
          path: _temp-blvm-protocol
      
      - name: Checkout consensus
        if: steps.skip_check.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          repository: BTCDecoded/blvm-consensus
          path: _temp-blvm-consensus
      
      - name: Checkout blvm-spec-lock (consensus path dep)
        if: steps.skip_check.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          repository: BTCDecoded/blvm-spec-lock
          path: _temp-spec-lock
      
      - name: Move dependencies to parent directory
        if: steps.skip_check.outputs.skip != 'true'
        run: |
          if [ -d "../blvm-node" ]; then rm -rf ../blvm-node; fi
          if [ -d "../blvm-protocol" ]; then rm -rf ../blvm-protocol; fi
          if [ -d "../blvm-consensus" ]; then rm -rf ../blvm-consensus; fi
          if [ -d "../blvm-spec-lock" ]; then rm -rf ../blvm-spec-lock; fi
          mv _temp-blvm-node ../blvm-node
          mv _temp-blvm-protocol ../blvm-protocol
          mv _temp-blvm-consensus ../blvm-consensus
          mv _temp-spec-lock ../blvm-spec-lock
      
      - name: Cache
        if: steps.skip_check.outputs.skip != 'true'
        run: |
          CACHE_ROOT="/tmp/runner-cache"
          CACHE_KEY="${{ needs.setup.outputs.cache-key }}"
          NODE_CACHE_KEY="${{ needs.setup.outputs.node-cache-key }}"
          PROTOCOL_CACHE_KEY="${{ needs.setup.outputs.protocol-cache-key }}"
          CONSENSUS_CACHE_KEY="${{ needs.setup.outputs.consensus-cache-key }}"
          
          echo "CARGO_CACHE_DIR=$CACHE_ROOT/cargo/$CACHE_KEY" >> $GITHUB_ENV
          echo "TARGET_CACHE_DIR=$CACHE_ROOT/target/$CACHE_KEY" >> $GITHUB_ENV
          echo "NODE_TARGET_DIR=$CACHE_ROOT/blvm-node-target/$NODE_CACHE_KEY" >> $GITHUB_ENV
          echo "PROTOCOL_TARGET_DIR=$CACHE_ROOT/blvm-protocol-target/$PROTOCOL_CACHE_KEY" >> $GITHUB_ENV
          echo "CONSENSUS_TARGET_DIR=$CACHE_ROOT/blvm-consensus-target/$CONSENSUS_CACHE_KEY" >> $GITHUB_ENV
      
      - name: Restore Cargo cache
        if: steps.skip_check.outputs.skip != 'true'
        uses: BTCDecoded/rust-ci/runner-cargo-cache@main
        with:
          operation: restore

      - name: Install Rust
        if: steps.skip_check.outputs.skip != 'true'
        uses: BTCDecoded/rust-ci/install-rust-toolchain@main
      
      - name: Run tests
        if: steps.skip_check.outputs.skip != 'true'
        run: |
          # Run tests in parallel (default) with all features
          # Use --lib --bins --tests to ensure all test types run
          cargo test --lib --bins --tests --all-features
      
      - name: Save Cargo cache
        if: always()
        uses: BTCDecoded/rust-ci/runner-cargo-cache@main
        with:
          operation: save

      - name: Prune old runner caches
        if: always()
        uses: BTCDecoded/rust-ci/runner-cargo-cache@main
        with:
          operation: prune

  clippy:
    name: Clippy
    needs: setup
    runs-on: [self-hosted, Linux, X64, builds]
    if: |
      (github.event_name != 'push' || github.event.head_commit == null || 
       (!contains(github.event.head_commit.message, '[skip ci]') &&
        !contains(github.event.head_commit.message, '[ci skip]') &&
        !contains(github.event.head_commit.message, '[no ci]'))) &&
      ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.skip_tests != 'true' }}
    steps:
      - uses: actions/checkout@v4
      

      - name: Strip [patch.crates-io] for crates.io-only CI
        uses: BTCDecoded/rust-ci/strip-patch-crates-io@main
      - name: Checkout blvm-node dependency
        uses: actions/checkout@v4
        with:
          repository: BTCDecoded/blvm-node
          path: _temp-blvm-node
      
      - name: Checkout blvm-protocol dependency
        uses: actions/checkout@v4
        with:
          repository: BTCDecoded/blvm-protocol
          path: _temp-blvm-protocol
      
      - name: Checkout consensus
        uses: actions/checkout@v4
        with:
          repository: BTCDecoded/blvm-consensus
          path: _temp-blvm-consensus
      
      - name: Checkout blvm-spec-lock (consensus path dep)
        uses: actions/checkout@v4
        with:
          repository: BTCDecoded/blvm-spec-lock
          path: _temp-spec-lock
      
      - name: Move dependencies to parent directory
        run: |
          if [ -d "../blvm-node" ]; then rm -rf ../blvm-node; fi
          if [ -d "../blvm-protocol" ]; then rm -rf ../blvm-protocol; fi
          if [ -d "../blvm-consensus" ]; then rm -rf ../blvm-consensus; fi
          if [ -d "../blvm-spec-lock" ]; then rm -rf ../blvm-spec-lock; fi
          mv _temp-blvm-node ../blvm-node
          mv _temp-blvm-protocol ../blvm-protocol
          mv _temp-blvm-consensus ../blvm-consensus
          mv _temp-spec-lock ../blvm-spec-lock
      
      - name: Cache
        uses: BTCDecoded/rust-ci/runner-cargo-cache@main
        with:
          operation: bind-env
          cache-key: ${{ needs.setup.outputs.cache-key }}
          include-target: "false"

      - name: Restore Cargo cache
        uses: BTCDecoded/rust-ci/runner-cargo-cache@main
        with:
          operation: restore

      - name: Install Rust
        uses: BTCDecoded/rust-ci/install-rust-toolchain@main
        with:
          components: clippy

      - name: Run clippy
        run: cargo clippy -- -D warnings

  fmt:
    name: Format
    needs: setup
    runs-on: [self-hosted, Linux, X64, builds]
    if: |
      (github.event_name != 'push' || github.event.head_commit == null || 
       (!contains(github.event.head_commit.message, '[skip ci]') &&
        !contains(github.event.head_commit.message, '[ci skip]') &&
        !contains(github.event.head_commit.message, '[no ci]'))) &&
      ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.skip_tests != 'true' }}
    steps:
      - uses: actions/checkout@v4
      

      - name: Strip [patch.crates-io] for crates.io-only CI
        uses: BTCDecoded/rust-ci/strip-patch-crates-io@main
      - name: Install Rust
        uses: BTCDecoded/rust-ci/install-rust-toolchain@main
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt -- --check

  docs:
    name: Docs
    needs: setup
    runs-on: [self-hosted, Linux, X64, builds]
    if: |
      (github.event_name != 'push' || github.event.head_commit == null || 
       (!contains(github.event.head_commit.message, '[skip ci]') &&
        !contains(github.event.head_commit.message, '[ci skip]') &&
        !contains(github.event.head_commit.message, '[no ci]'))) &&
      ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.skip_tests != 'true' }}
    steps:
      - uses: actions/checkout@v4
      

      - name: Strip [patch.crates-io] for crates.io-only CI
        uses: BTCDecoded/rust-ci/strip-patch-crates-io@main
      - name: Checkout blvm-node dependency
        uses: actions/checkout@v4
        with:
          repository: BTCDecoded/blvm-node
          path: _temp-blvm-node
      
      - name: Checkout blvm-protocol dependency
        uses: actions/checkout@v4
        with:
          repository: BTCDecoded/blvm-protocol
          path: _temp-blvm-protocol
      
      - name: Checkout consensus
        uses: actions/checkout@v4
        with:
          repository: BTCDecoded/blvm-consensus
          path: _temp-blvm-consensus
      
      - name: Checkout blvm-spec-lock (consensus path dep)
        uses: actions/checkout@v4
        with:
          repository: BTCDecoded/blvm-spec-lock
          path: _temp-spec-lock
      
      - name: Move dependencies to parent directory
        run: |
          if [ -d "../blvm-node" ]; then rm -rf ../blvm-node; fi
          if [ -d "../blvm-protocol" ]; then rm -rf ../blvm-protocol; fi
          if [ -d "../blvm-consensus" ]; then rm -rf ../blvm-consensus; fi
          if [ -d "../blvm-spec-lock" ]; then rm -rf ../blvm-spec-lock; fi
          mv _temp-blvm-node ../blvm-node
          mv _temp-blvm-protocol ../blvm-protocol
          mv _temp-blvm-consensus ../blvm-consensus
          mv _temp-spec-lock ../blvm-spec-lock
      
      - name: Cache
        uses: BTCDecoded/rust-ci/runner-cargo-cache@main
        with:
          operation: bind-env
          cache-key: ${{ needs.setup.outputs.cache-key }}
          include-target: "false"

      - name: Restore Cargo cache
        uses: BTCDecoded/rust-ci/runner-cargo-cache@main
        with:
          operation: restore

      - name: Install Rust
        uses: BTCDecoded/rust-ci/install-rust-toolchain@main

      - name: Clean target to avoid dep info corruption
        run: |
          # Clean only the problematic dep info files, not the entire target
          # This helps avoid race conditions with concurrent builds
          if [ -d "./target" ]; then
            find ./target -name "*.d" -type f -delete 2>/dev/null || true
          fi
      
      - name: Build docs
        run: cargo doc --no-deps
      
      - name: Check docs
        run: cargo doc --no-deps --document-private-items

  security:
    name: Security
    needs: setup
    runs-on: [self-hosted, Linux, X64, builds]
    if: |
      (github.event_name != 'push' || github.event.head_commit == null || 
       (!contains(github.event.head_commit.message, '[skip ci]') &&
        !contains(github.event.head_commit.message, '[ci skip]') &&
        !contains(github.event.head_commit.message, '[no ci]')))
    steps:
      - uses: actions/checkout@v4
      

      - name: Strip [patch.crates-io] for crates.io-only CI
        uses: BTCDecoded/rust-ci/strip-patch-crates-io@main
      - name: Install Rust
        uses: BTCDecoded/rust-ci/install-rust-toolchain@main
      
      - name: Install cargo-audit
        run: |
          # Ensure cargo bin is in PATH (fixes exit code 127)
          export PATH="$HOME/.cargo/bin:$PATH"
          cargo install cargo-audit --version 0.21.0 --locked
      
      - name: Run security audit
        run: cargo audit

  build:
    name: Build
    needs: 
      - setup
      - test
      - clippy
      - fmt
      - docs
      - security
    runs-on: [self-hosted, Linux, X64, builds]
    env:
      # Use release-fast for PRs, branches, nightly — full release only for push to main
      BLVM_FAST_BUILD: ${{ ((github.event_name != 'push' || github.ref != 'refs/heads/main') && (github.event_name != 'release')) && '1' || '' }}
    if: |
      always() &&
      needs.setup.result == 'success' &&
      (github.event_name == 'push' || github.event_name == 'release' || github.event_name == 'repository_dispatch' || github.event_name == 'workflow_dispatch') &&
      (github.event_name != 'push' || github.event.head_commit == null || 
       (!contains(github.event.head_commit.message, '[skip ci]') &&
        !contains(github.event.head_commit.message, '[ci skip]') &&
        !contains(github.event.head_commit.message, '[no ci]'))) &&
      ((github.event_name == 'workflow_dispatch' && github.event.inputs.skip_tests == 'true') ||
       (needs.test.result == 'success' && needs.clippy.result == 'success' && 
        needs.fmt.result == 'success' && needs.docs.result == 'success' && 
        needs.security.result == 'success'))
    steps:
      - uses: actions/checkout@v4
      

      - name: Strip [patch.crates-io] for crates.io-only CI
        uses: BTCDecoded/rust-ci/strip-patch-crates-io@main
      - name: Checkout blvm-node dependency
        uses: actions/checkout@v4
        with:
          repository: BTCDecoded/blvm-node
          path: _temp-blvm-node
      
      - name: Checkout blvm-protocol dependency
        uses: actions/checkout@v4
        with:
          repository: BTCDecoded/blvm-protocol
          path: _temp-blvm-protocol
      
      - name: Checkout consensus
        uses: actions/checkout@v4
        with:
          repository: BTCDecoded/blvm-consensus
          path: _temp-blvm-consensus
      
      - name: Checkout blvm-spec-lock (consensus path dep)
        uses: actions/checkout@v4
        with:
          repository: BTCDecoded/blvm-spec-lock
          path: _temp-spec-lock
      
      - name: Move dependencies to parent directory
        run: |
          if [ -d "../blvm-node" ]; then rm -rf ../blvm-node; fi
          if [ -d "../blvm-protocol" ]; then rm -rf ../blvm-protocol; fi
          if [ -d "../blvm-consensus" ]; then rm -rf ../blvm-consensus; fi
          if [ -d "../blvm-spec-lock" ]; then rm -rf ../blvm-spec-lock; fi
          mv _temp-blvm-node ../blvm-node
          mv _temp-blvm-protocol ../blvm-protocol
          mv _temp-blvm-consensus ../blvm-consensus
          mv _temp-spec-lock ../blvm-spec-lock
      
      - name: Cache
        run: |
          CACHE_ROOT="/tmp/runner-cache"
          CACHE_KEY="${{ needs.setup.outputs.cache-key }}"
          NODE_CACHE_KEY="${{ needs.setup.outputs.node-cache-key }}"
          PROTOCOL_CACHE_KEY="${{ needs.setup.outputs.protocol-cache-key }}"
          CONSENSUS_CACHE_KEY="${{ needs.setup.outputs.consensus-cache-key }}"
          
          echo "CARGO_CACHE_DIR=$CACHE_ROOT/cargo/$CACHE_KEY" >> $GITHUB_ENV
          echo "TARGET_CACHE_DIR=$CACHE_ROOT/target/$CACHE_KEY" >> $GITHUB_ENV
          echo "NODE_TARGET_DIR=$CACHE_ROOT/blvm-node-target/$NODE_CACHE_KEY" >> $GITHUB_ENV
          echo "PROTOCOL_TARGET_DIR=$CACHE_ROOT/blvm-protocol-target/$PROTOCOL_CACHE_KEY" >> $GITHUB_ENV
          echo "CONSENSUS_TARGET_DIR=$CACHE_ROOT/blvm-consensus-target/$CONSENSUS_CACHE_KEY" >> $GITHUB_ENV
      
      - name: Restore Cargo cache
        uses: BTCDecoded/rust-ci/runner-cargo-cache@main
        with:
          operation: restore

      - name: Install Rust
        uses: BTCDecoded/rust-ci/install-rust-toolchain@main

      - name: Build
        run: |
          PROFILE_FLAG="--release"
          [ -n "${BLVM_FAST_BUILD:-}" ] && PROFILE_FLAG="--profile release-fast"
          cargo build $PROFILE_FLAG
      
      - name: Build tests
        run: |
          PROFILE_FLAG="--release"
          [ -n "${BLVM_FAST_BUILD:-}" ] && PROFILE_FLAG="--profile release-fast"
          cargo test --no-run $PROFILE_FLAG --all-features
      
      - name: Save Cargo cache
        if: always()
        uses: BTCDecoded/rust-ci/runner-cargo-cache@main
        with:
          operation: save

      - name: Prune old runner caches
        if: always()
        uses: BTCDecoded/rust-ci/runner-cargo-cache@main
        with:
          operation: prune

