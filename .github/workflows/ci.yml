name: CI

# Commit message skip tokens (push only): [skip_tests], [skip_docs], [skip_fuzz], [skip_security], [skip_release], [skip_verify], [skip_docker]
# [skip_docs] also skips clippy and fmt.
# [skip_verify] skips the release-profile build job (cargo build --release).
# [skip_release] prevents the release job from running (no publish, no GitHub Release, no tag).
# [skip_docker] skips the GHCR container publish job (docker-ghcr).
# Tokens are matched against setup.commit_msg_bundle (git log range) plus head_commit when set.
#
# GHCR auth: use github.token (same credential as secrets.GITHUB_TOKEN — automatic per-run token).

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  release:
    types: [published]
  repository_dispatch:
    types: [build-chain, upstream-changed]
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip test execution and build steps'
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  actions: write
  packages: write # GHCR: docker-ghcr job pushes container images

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: '1'
  CARGO_INCREMENTAL: '0'
  # Shared per-run target dir so build-dev artifacts are reused by test/clippy/docs.
  BLVM_BUILD_TARGET: /tmp/gh-blvm-build/${{ github.run_id }}/target

jobs:
  setup:
    name: Setup
    runs-on: [self-hosted, Linux, X64, builds]
    if: |
      (github.event_name != 'push' || github.event.head_commit == null ||
       (!contains(github.event.head_commit.message, '[skip ci]') &&
        !contains(github.event.head_commit.message, '[ci skip]') &&
        !contains(github.event.head_commit.message, '[no ci]')))
    outputs:
      cache-key: ${{ steps.setup-cache.outputs.cache-key }}
      commit_msg_bundle: ${{ steps.commit-msg-bundle.outputs.bundle }}
    steps:
      - name: Emergency pre-flight disk cleanup
        run: |
          df -h /
          if [ -d /tmp/gh-blvm-build ]; then
            find /tmp/gh-blvm-build -mindepth 1 -maxdepth 1 -type d \
              -not -name "${{ github.run_id }}" \
              -mmin +60 \
              -exec rm -rf {} + 2>/dev/null || true
            USED=$(du -sb /tmp/gh-blvm-build 2>/dev/null | cut -f1 || echo 0)
            if [ "$USED" -gt 53687091200 ]; then
              find /tmp/gh-blvm-build -mindepth 1 -maxdepth 1 -type d \
                -not -name "${{ github.run_id }}" \
                -exec rm -rf {} + 2>/dev/null || true
            fi
          fi

      - name: Disk check
        uses: BTCDecoded/rust-ci/runner-disk-guard@main

      - uses: actions/checkout@v4

      - name: Strip [patch.crates-io] for crates.io-only CI
        uses: BTCDecoded/rust-ci/strip-patch-crates-io@main

      - name: Commit message bundle (push payloads often omit head_commit)
        id: commit-msg-bundle
        shell: bash
        run: |
          echo 'bundle<<COMMIT_MSG_BUNDLE_EOF' >> "$GITHUB_OUTPUT"
          if [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            BEFORE="${{ github.event.before }}"
            AFTER="${{ github.sha }}"
            if [ -n "$BEFORE" ] && [ "$BEFORE" != "0000000000000000000000000000000000000000" ]; then
              git log --pretty=%B "${BEFORE}..${AFTER}" 2>/dev/null || git log -1 --pretty=%B
            else
              git log -1 --pretty=%B
            fi
          fi
          echo 'COMMIT_MSG_BUNDLE_EOF' >> "$GITHUB_OUTPUT"

      - name: Cache key
        id: setup-cache
        run: |
          CACHE_ROOT="/tmp/runner-cache"
          # blvm commits Cargo.lock — use it for cache key
          DEPS_KEY=$(sha256sum Cargo.lock | cut -d' ' -f1)
          TOOLCHAIN=$(grep -E '^channel|rust-version' rust-toolchain.toml Cargo.toml 2>/dev/null | head -1 | sha256sum | cut -d' ' -f1 || echo "stable")
          CACHE_KEY="${DEPS_KEY}-${TOOLCHAIN}"
          CARGO_CACHE_DIR="$CACHE_ROOT/cargo/$CACHE_KEY"
          TARGET_CACHE_DIR="$CACHE_ROOT/target/$CACHE_KEY"
          echo "CARGO_CACHE_DIR=$CARGO_CACHE_DIR" >> $GITHUB_ENV
          echo "TARGET_CACHE_DIR=$TARGET_CACHE_DIR" >> $GITHUB_ENV
          echo "cache-key=$CACHE_KEY" >> $GITHUB_OUTPUT
          mkdir -p "$CARGO_CACHE_DIR"/{registry,git} "$TARGET_CACHE_DIR"

      - name: Install Rust
        uses: BTCDecoded/rust-ci/install-rust-toolchain@main

  build-dev:
    name: Build (dev, shared)
    needs: setup
    runs-on: [self-hosted, Linux, X64, builds]
    if: |
      (github.event_name != 'push' || github.event.head_commit == null ||
       (!contains(github.event.head_commit.message, '[skip ci]') &&
        !contains(github.event.head_commit.message, '[ci skip]') &&
        !contains(github.event.head_commit.message, '[no ci]'))) &&
      (github.event_name != 'push' || github.event.head_commit == null ||
       !contains(github.event.head_commit.message, '[skip_tests]')) &&
      (github.event_name != 'workflow_dispatch' || github.event.inputs.skip_tests != 'true')
    steps:
      - name: Show disk usage
        run: |
          df -h /
          du -sh /tmp/gh-blvm-build 2>/dev/null || true

      - uses: actions/checkout@v4

      - name: Strip [patch.crates-io] for crates.io-only CI
        uses: BTCDecoded/rust-ci/strip-patch-crates-io@main

      - name: Clean leftover path overrides
        run: |
          if [ -d "../blvm-node" ]; then rm -rf ../blvm-node; fi
          if [ -d "../blvm-protocol" ]; then rm -rf ../blvm-protocol; fi
          if [ -d "../blvm-consensus" ]; then rm -rf ../blvm-consensus; fi
          if [ -f ".cargo/config.toml" ]; then rm -f .cargo/config.toml; fi

      - name: Install OpenSSL development headers
        run: |
          if command -v apt-get >/dev/null 2>&1; then
            bash scripts/apt-get-retry.sh update -qq
            bash scripts/apt-get-retry.sh install -y -qq pkg-config libssl-dev
          elif command -v pacman >/dev/null 2>&1; then
            pacman -Qq openssl pkgconf >/dev/null 2>&1 || sudo pacman -Sy --noconfirm openssl pkgconf
          fi

      - name: Isolate CARGO_HOME for this runner
        run: |
          mkdir -p "${RUNNER_TEMP}/cargo"
          echo "CARGO_HOME=${RUNNER_TEMP}/cargo" >> "$GITHUB_ENV"

      - name: Cache
        uses: BTCDecoded/rust-ci/runner-cargo-cache@main
        with:
          operation: bind-env
          cache-key: ${{ needs.setup.outputs.cache-key }}

      - name: Restore Cargo cache
        uses: BTCDecoded/rust-ci/runner-cargo-cache@main
        with:
          operation: restore

      - name: Install Rust
        uses: BTCDecoded/rust-ci/install-rust-toolchain@main

      - name: Compile test binaries (default features)
        env:
          CARGO_TARGET_DIR: ${{ env.BLVM_BUILD_TARGET }}
        run: |
          unset CC CXX CPP AR || true
          cargo test --no-run

      - name: Dump disk usage on failure
        if: failure()
        run: |
          df -h /
          du -sh /tmp/gh-blvm-build/* 2>/dev/null | sort -rh | head -10

      - name: Save Cargo cache
        if: always()
        uses: BTCDecoded/rust-ci/runner-cargo-cache@main
        with:
          operation: save

      - name: Prune old runner caches
        if: always()
        uses: BTCDecoded/rust-ci/runner-cargo-cache@main
        with:
          operation: prune

  test:
    name: Test
    needs: [setup, build-dev]
    runs-on: [self-hosted, Linux, X64, builds]
    if: |
      (github.event_name != 'push' || github.event.head_commit == null ||
       (!contains(github.event.head_commit.message, '[skip ci]') &&
        !contains(github.event.head_commit.message, '[ci skip]') &&
        !contains(github.event.head_commit.message, '[no ci]'))) &&
      (github.event_name != 'push' || github.event.head_commit == null ||
       !contains(github.event.head_commit.message, '[skip_tests]')) &&
      (github.event_name != 'workflow_dispatch' || github.event.inputs.skip_tests != 'true')
    steps:
      - uses: actions/checkout@v4

      - name: Strip [patch.crates-io] for crates.io-only CI
        uses: BTCDecoded/rust-ci/strip-patch-crates-io@main

      - name: Clean leftover path overrides
        run: |
          if [ -d "../blvm-node" ]; then rm -rf ../blvm-node; fi
          if [ -d "../blvm-protocol" ]; then rm -rf ../blvm-protocol; fi
          if [ -d "../blvm-consensus" ]; then rm -rf ../blvm-consensus; fi
          if [ -f ".cargo/config.toml" ]; then rm -f .cargo/config.toml; fi

      - name: Install OpenSSL development headers
        run: |
          if command -v apt-get >/dev/null 2>&1; then
            bash scripts/apt-get-retry.sh update -qq
            bash scripts/apt-get-retry.sh install -y -qq pkg-config libssl-dev
          elif command -v pacman >/dev/null 2>&1; then
            pacman -Qq openssl pkgconf >/dev/null 2>&1 || sudo pacman -Sy --noconfirm openssl pkgconf
          fi

      - name: Isolate CARGO_HOME for this runner
        run: |
          mkdir -p "${RUNNER_TEMP}/cargo"
          echo "CARGO_HOME=${RUNNER_TEMP}/cargo" >> "$GITHUB_ENV"

      - name: Cache
        uses: BTCDecoded/rust-ci/runner-cargo-cache@main
        with:
          operation: bind-env
          cache-key: ${{ needs.setup.outputs.cache-key }}

      - name: Restore Cargo cache
        uses: BTCDecoded/rust-ci/runner-cargo-cache@main
        with:
          operation: restore

      - name: Install Rust
        uses: BTCDecoded/rust-ci/install-rust-toolchain@main

      - name: Run tests
        env:
          CARGO_TARGET_DIR: ${{ env.BLVM_BUILD_TARGET }}
        run: |
          unset CC CXX CPP AR || true
          cargo test --lib --bins --tests

      - name: Dump disk usage on failure
        if: failure()
        run: |
          df -h /
          du -sh /tmp/gh-blvm-build/* 2>/dev/null | sort -rh | head -10

      - name: Clean test executables and stale run dirs
        if: always()
        run: |
          TARGET="${{ env.BLVM_BUILD_TARGET }}"
          if [ -d "$TARGET/debug" ]; then
            find "$TARGET/debug" -maxdepth 1 -type f -executable ! -name "*.so" ! -name "*.rlib" ! -name "*.d" \
              -delete 2>/dev/null || true
          fi
          find /tmp/gh-blvm-build -mindepth 1 -maxdepth 1 -type d \
            -not -name "${{ github.run_id }}" \
            -exec rm -rf {} + 2>/dev/null || true

      - name: Save Cargo cache
        if: always()
        uses: BTCDecoded/rust-ci/runner-cargo-cache@main
        with:
          operation: save

      - name: Prune old runner caches
        if: always()
        uses: BTCDecoded/rust-ci/runner-cargo-cache@main
        with:
          operation: prune

  clippy:
    name: Clippy
    needs: [setup, build-dev]
    runs-on: [self-hosted, Linux, X64, builds]
    if: |
      (github.event_name != 'push' || github.event.head_commit == null ||
       (!contains(github.event.head_commit.message, '[skip ci]') &&
        !contains(github.event.head_commit.message, '[ci skip]') &&
        !contains(github.event.head_commit.message, '[no ci]'))) &&
      (github.event_name != 'push' || github.event.head_commit == null ||
       !contains(github.event.head_commit.message, '[skip_tests]')) &&
      (github.event_name != 'push' || github.event.head_commit == null ||
       !contains(github.event.head_commit.message, '[skip_docs]')) &&
      (github.event_name != 'workflow_dispatch' || github.event.inputs.skip_tests != 'true')
    steps:
      - uses: actions/checkout@v4

      - name: Strip [patch.crates-io] for crates.io-only CI
        uses: BTCDecoded/rust-ci/strip-patch-crates-io@main

      - name: Clean leftover path overrides
        run: |
          if [ -d "../blvm-node" ]; then rm -rf ../blvm-node; fi
          if [ -d "../blvm-protocol" ]; then rm -rf ../blvm-protocol; fi
          if [ -d "../blvm-consensus" ]; then rm -rf ../blvm-consensus; fi
          if [ -f ".cargo/config.toml" ]; then rm -f .cargo/config.toml; fi

      - name: Install OpenSSL development headers
        run: |
          if command -v apt-get >/dev/null 2>&1; then
            bash scripts/apt-get-retry.sh update -qq
            bash scripts/apt-get-retry.sh install -y -qq pkg-config libssl-dev
          elif command -v pacman >/dev/null 2>&1; then
            pacman -Qq openssl pkgconf >/dev/null 2>&1 || sudo pacman -Sy --noconfirm openssl pkgconf
          fi

      - name: Isolate CARGO_HOME for this runner
        run: |
          mkdir -p "${RUNNER_TEMP}/cargo"
          echo "CARGO_HOME=${RUNNER_TEMP}/cargo" >> "$GITHUB_ENV"

      - name: Cache
        uses: BTCDecoded/rust-ci/runner-cargo-cache@main
        with:
          operation: bind-env
          cache-key: ${{ needs.setup.outputs.cache-key }}
          include-target: false

      - name: Restore Cargo cache
        uses: BTCDecoded/rust-ci/runner-cargo-cache@main
        with:
          operation: restore

      - name: Install Rust
        uses: BTCDecoded/rust-ci/install-rust-toolchain@main

      # Integration tests: compiled in the `test` job. Clippy matches blvm-node CI: lib + bins only
      # (strict `uninlined_format_args` + warnings); `tests/*.rs` are not linted as separate crates here.
      - name: Clippy (default features)
        env:
          CARGO_TARGET_DIR: ${{ env.BLVM_BUILD_TARGET }}
        run: cargo clippy --lib --bins -- -D clippy::uninlined_format_args -D warnings

      - name: Clippy (all features, incremental)
        env:
          CARGO_TARGET_DIR: ${{ env.BLVM_BUILD_TARGET }}
        run: cargo clippy --lib --bins --all-features -- -D clippy::uninlined_format_args -D warnings

  fmt:
    name: Format
    needs: setup
    runs-on: [self-hosted, Linux, X64, builds]
    if: |
      (github.event_name != 'push' || github.event.head_commit == null ||
       (!contains(github.event.head_commit.message, '[skip ci]') &&
        !contains(github.event.head_commit.message, '[ci skip]') &&
        !contains(github.event.head_commit.message, '[no ci]'))) &&
      (github.event_name != 'push' || github.event.head_commit == null ||
       !contains(github.event.head_commit.message, '[skip_tests]')) &&
      (github.event_name != 'push' || github.event.head_commit == null ||
       !contains(github.event.head_commit.message, '[skip_docs]')) &&
      (github.event_name != 'workflow_dispatch' || github.event.inputs.skip_tests != 'true')
    steps:
      - uses: actions/checkout@v4

      - name: Strip [patch.crates-io] for crates.io-only CI
        uses: BTCDecoded/rust-ci/strip-patch-crates-io@main

      - name: Install Rust
        uses: BTCDecoded/rust-ci/install-rust-toolchain@main

      - name: Check formatting
        run: cargo fmt --all -- --check

  docs:
    name: Docs
    needs: [setup, build-dev]
    runs-on: [self-hosted, Linux, X64, builds]
    if: |
      (github.event_name != 'push' || github.event.head_commit == null ||
       (!contains(github.event.head_commit.message, '[skip ci]') &&
        !contains(github.event.head_commit.message, '[ci skip]') &&
        !contains(github.event.head_commit.message, '[no ci]'))) &&
      (github.event_name != 'push' || github.event.head_commit == null ||
       !contains(github.event.head_commit.message, '[skip_docs]')) &&
      (github.event_name != 'workflow_dispatch' || github.event.inputs.skip_tests != 'true')
    steps:
      - uses: actions/checkout@v4

      - name: Strip [patch.crates-io] for crates.io-only CI
        uses: BTCDecoded/rust-ci/strip-patch-crates-io@main

      - name: Clean leftover path overrides
        run: |
          if [ -d "../blvm-node" ]; then rm -rf ../blvm-node; fi
          if [ -d "../blvm-protocol" ]; then rm -rf ../blvm-protocol; fi
          if [ -d "../blvm-consensus" ]; then rm -rf ../blvm-consensus; fi
          if [ -f ".cargo/config.toml" ]; then rm -f .cargo/config.toml; fi

      - name: Isolate CARGO_HOME for this runner
        run: |
          mkdir -p "${RUNNER_TEMP}/cargo"
          echo "CARGO_HOME=${RUNNER_TEMP}/cargo" >> "$GITHUB_ENV"

      - name: Cache
        uses: BTCDecoded/rust-ci/runner-cargo-cache@main
        with:
          operation: bind-env
          cache-key: ${{ needs.setup.outputs.cache-key }}
          include-target: false

      - name: Restore Cargo cache
        uses: BTCDecoded/rust-ci/runner-cargo-cache@main
        with:
          operation: restore

      - name: Install Rust
        uses: BTCDecoded/rust-ci/install-rust-toolchain@main

      - name: Build docs
        run: cargo doc --no-deps --document-private-items

  security:
    name: Security
    needs: setup
    runs-on: [self-hosted, Linux, X64, builds]
    if: |
      (github.event_name != 'push' || github.event.head_commit == null ||
       (!contains(github.event.head_commit.message, '[skip ci]') &&
        !contains(github.event.head_commit.message, '[ci skip]') &&
        !contains(github.event.head_commit.message, '[no ci]'))) &&
      (github.event_name != 'push' || github.event.head_commit == null ||
       !contains(github.event.head_commit.message, '[skip_tests]')) &&
      (github.event_name != 'push' || github.event.head_commit == null ||
       !contains(github.event.head_commit.message, '[skip_security]')) &&
      (github.event_name != 'workflow_dispatch' || github.event.inputs.skip_tests != 'true')
    steps:
      - uses: actions/checkout@v4

      - name: Strip [patch.crates-io] for crates.io-only CI
        uses: BTCDecoded/rust-ci/strip-patch-crates-io@main

      - name: Install Rust
        uses: BTCDecoded/rust-ci/install-rust-toolchain@main

      - name: Install cargo-audit
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          cargo install cargo-audit --version 0.22.1 --locked

      - name: Run security audit
        run: cargo audit

  build:
    name: Build (release)
    needs:
      - setup
      - build-dev
      - test
      - clippy
      - fmt
      - docs
      - security
    runs-on: [self-hosted, Linux, X64, builds]
    if: |
      always() &&
      needs.setup.result == 'success' &&
      (needs.build-dev.result == 'success' || needs.build-dev.result == 'skipped') &&
      (github.event_name == 'push' || github.event_name == 'release' || github.event_name == 'repository_dispatch' || github.event_name == 'workflow_dispatch') &&
      (github.event_name != 'push' || github.event.head_commit == null ||
       (!contains(github.event.head_commit.message, '[skip ci]') &&
        !contains(github.event.head_commit.message, '[ci skip]') &&
        !contains(github.event.head_commit.message, '[no ci]'))) &&
      ((github.event_name == 'workflow_dispatch' && github.event.inputs.skip_tests == 'true') ||
       ((needs.test.result == 'success' || needs.test.result == 'skipped') &&
        (needs.clippy.result == 'success' || needs.clippy.result == 'skipped') &&
        (needs.fmt.result == 'success' || needs.fmt.result == 'skipped') &&
        (needs.docs.result == 'success' || needs.docs.result == 'skipped') &&
        (needs.security.result == 'success' || needs.security.result == 'skipped')))
    steps:
      - uses: actions/checkout@v4

      - name: Strip [patch.crates-io] for crates.io-only CI
        uses: BTCDecoded/rust-ci/strip-patch-crates-io@main

      - name: Clean leftover path overrides
        run: |
          if [ -d "../blvm-node" ]; then rm -rf ../blvm-node; fi
          if [ -d "../blvm-protocol" ]; then rm -rf ../blvm-protocol; fi
          if [ -d "../blvm-consensus" ]; then rm -rf ../blvm-consensus; fi
          if [ -f ".cargo/config.toml" ]; then rm -f .cargo/config.toml; fi

      - name: Install OpenSSL development headers
        run: |
          if command -v apt-get >/dev/null 2>&1; then
            bash scripts/apt-get-retry.sh update -qq
            bash scripts/apt-get-retry.sh install -y -qq pkg-config libssl-dev
          elif command -v pacman >/dev/null 2>&1; then
            pacman -Qq openssl pkgconf >/dev/null 2>&1 || sudo pacman -Sy --noconfirm openssl pkgconf
          fi

      - name: Isolate CARGO_HOME for this runner
        run: |
          mkdir -p "${RUNNER_TEMP}/cargo"
          echo "CARGO_HOME=${RUNNER_TEMP}/cargo" >> "$GITHUB_ENV"

      - name: Cache
        uses: BTCDecoded/rust-ci/runner-cargo-cache@main
        with:
          operation: bind-env
          cache-key: ${{ needs.setup.outputs.cache-key }}

      - name: Restore Cargo cache
        uses: BTCDecoded/rust-ci/runner-cargo-cache@main
        with:
          operation: restore

      - name: Install Rust
        uses: BTCDecoded/rust-ci/install-rust-toolchain@main

      - name: Build release
        env:
          CARGO_BUILD_JOBS: 8
        run: |
          # Runner sometimes exports CC= globally; cc-rs treats that as set-but-empty and
          # -sys crates fail to compile bundled C (zstd-sys, lz4-sys, rocksdb, etc.).
          # --locked is omitted: strip-patch-crates-io removes [patch.crates-io] so the
          # committed Cargo.lock has no registry source for patched crates; cargo must
          # re-resolve from crates.io before building.
          unset CC CXX CPP AR || true
          cargo build --release

      - name: Dump disk usage on failure
        if: failure()
        run: df -h /

      - name: Save Cargo cache
        if: always()
        uses: BTCDecoded/rust-ci/runner-cargo-cache@main
        with:
          operation: save

      - name: Prune old runner caches
        if: always()
        uses: BTCDecoded/rust-ci/runner-cargo-cache@main
        with:
          operation: prune

  release:
    name: Release
    needs: [setup, build, build-dev, test, clippy, fmt, docs, security]
    runs-on: [self-hosted, Linux, X64, builds]
    permissions:
      contents: write
      id-token: write
      attestations: write
    if: |
      always() &&
      needs.setup.result == 'success' &&
      needs.build.result == 'success' &&
      (needs.build-dev.result == 'success' || needs.build-dev.result == 'skipped') &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') &&
      !contains(needs.setup.outputs.commit_msg_bundle, '[skip ci]') &&
      (github.event.head_commit == null || !contains(github.event.head_commit.message, '[skip ci]')) &&
      !contains(needs.setup.outputs.commit_msg_bundle, '[ci skip]') &&
      (github.event.head_commit == null || !contains(github.event.head_commit.message, '[ci skip]')) &&
      !contains(needs.setup.outputs.commit_msg_bundle, '[no ci]') &&
      (github.event.head_commit == null || !contains(github.event.head_commit.message, '[no ci]')) &&
      !contains(needs.setup.outputs.commit_msg_bundle, '[skip_release]') &&
      (github.event.head_commit == null || !contains(github.event.head_commit.message, '[skip_release]')) &&
      ((github.event_name == 'workflow_dispatch' && github.event.inputs.skip_tests == 'true') ||
       (
         (needs.test.result == 'success' || (needs.test.result == 'skipped' && (contains(needs.setup.outputs.commit_msg_bundle, '[skip_tests]') || (github.event.head_commit != null && contains(github.event.head_commit.message, '[skip_tests]'))))) &&
         (needs.clippy.result == 'success' || (needs.clippy.result == 'skipped' && (contains(needs.setup.outputs.commit_msg_bundle, '[skip_docs]') || contains(needs.setup.outputs.commit_msg_bundle, '[skip_tests]') || (github.event.head_commit != null && (contains(github.event.head_commit.message, '[skip_docs]') || contains(github.event.head_commit.message, '[skip_tests]')))))) &&
         (needs.fmt.result == 'success' || (needs.fmt.result == 'skipped' && (contains(needs.setup.outputs.commit_msg_bundle, '[skip_docs]') || contains(needs.setup.outputs.commit_msg_bundle, '[skip_tests]') || (github.event.head_commit != null && (contains(github.event.head_commit.message, '[skip_docs]') || contains(github.event.head_commit.message, '[skip_tests]')))))) &&
         (needs.docs.result == 'success' || (needs.docs.result == 'skipped' && (contains(needs.setup.outputs.commit_msg_bundle, '[skip_docs]') || contains(needs.setup.outputs.commit_msg_bundle, '[skip_tests]') || (github.event.head_commit != null && (contains(github.event.head_commit.message, '[skip_docs]') || contains(github.event.head_commit.message, '[skip_tests]')))))) &&
         (needs.security.result == 'success' || (needs.security.result == 'skipped' && (contains(needs.setup.outputs.commit_msg_bundle, '[skip_security]') || contains(needs.setup.outputs.commit_msg_bundle, '[skip_tests]') || (github.event.head_commit != null && (contains(github.event.head_commit.message, '[skip_security]') || contains(github.event.head_commit.message, '[skip_tests]'))))))
       ))
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    outputs:
      version: ${{ steps.version.outputs.version }}
      version_tag: ${{ steps.version.outputs.version_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Strip [patch.crates-io] for crates.io-only CI
        uses: BTCDecoded/rust-ci/strip-patch-crates-io@main

      - name: Install OpenSSL development headers
        run: |
          if command -v apt-get >/dev/null 2>&1; then
            bash scripts/apt-get-retry.sh update -qq
            bash scripts/apt-get-retry.sh install -y -qq pkg-config libssl-dev
          elif command -v pacman >/dev/null 2>&1; then
            pacman -Qq openssl pkgconf >/dev/null 2>&1 || sudo pacman -Sy --noconfirm openssl pkgconf
          fi

      - name: Install Rust
        uses: BTCDecoded/rust-ci/install-rust-toolchain@main

      - name: Determine version
        id: version
        run: |
          CURRENT=$(grep -A 10 '^\[package\]' Cargo.toml | grep '^version = ' | head -1 | sed -E 's/^version = "([^"]+)".*/\1/')
          if [ -z "$CURRENT" ]; then
            echo "❌ Could not determine current version from Cargo.toml"
            exit 1
          fi
          echo "Current version: ${CURRENT}"
          if ! echo "$CURRENT" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "❌ Invalid version format: ${CURRENT}"
            exit 1
          fi
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          CURRENT_PATCH=$(echo "$CURRENT" | cut -d. -f3)

          # Collect already-used versions from two sources:
          # 1. Git tags (primary — always accurate, works even if crate is never published)
          TAGGED_VERSIONS=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' | sed 's/^v//' | sed 's/-unverified$//')
          echo "Git-tagged versions: $(echo "$TAGGED_VERSIONS" | tr '\n' ' ')"

          # 2. crates.io (secondary — catches versions published by other means)
          API_RESPONSE=$(curl -sf \
            -H "User-Agent: blvm-ci/1.0 (github.com/BTCDecoded/blvm)" \
            "https://crates.io/api/v1/crates/blvm/versions" 2>/dev/null || echo "")
          CRATES_VERSIONS=""
          if [ -n "$API_RESPONSE" ] && ! echo "$API_RESPONSE" | grep -q '"detail"'; then
            if command -v jq &>/dev/null; then
              CRATES_VERSIONS=$(echo "$API_RESPONSE" | jq -r '.versions[].num' 2>/dev/null || echo "")
            else
              CRATES_VERSIONS=$(echo "$API_RESPONSE" | grep -oE '"num":"[^"]+"' | sed 's/"num":"//;s/"//')
            fi
          fi

          # Combined list — version is taken if it appears in either source
          USED_VERSIONS=$(printf '%s\n%s' "$TAGGED_VERSIONS" "$CRATES_VERSIONS" | sort -u | grep -v '^$')
          echo "All used versions: $(echo "$USED_VERSIONS" | tr '\n' ' ')"

          # Next patch: max(Cargo.toml, all used X.Y.* on this MAJOR.MINOR) + 1 — not "current+1" then walk.
          SAME_LINE_PATCHES=$(printf '%s\n' "$USED_VERSIONS" | grep -E "^${MAJOR}\\.${MINOR}\\.[0-9]+$" | cut -d. -f3 || true)
          MAX_PATCH=$(printf '%s\n' $SAME_LINE_PATCHES "$CURRENT_PATCH" | grep -E '^[0-9]+$' | sort -n | tail -1)
          [ -n "$MAX_PATCH" ] || MAX_PATCH="$CURRENT_PATCH"
          PATCH=$((MAX_PATCH + 1))
          VERSION="${MAJOR}.${MINOR}.${PATCH}"
          while echo "$USED_VERSIONS" | grep -qxF "$VERSION"; do
            echo "⚠️  v${VERSION} still used (tag or crates.io); bumping patch..."
            PATCH=$((PATCH + 1))
            VERSION="${MAJOR}.${MINOR}.${PATCH}"
          done
          echo "✅ v${VERSION} is free"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.skip_tests }}" = "true" ]; then
            VERSION_TAG="v${VERSION}-unverified"
          else
            VERSION_TAG="v${VERSION}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "version_tag=${VERSION_TAG}" >> $GITHUB_OUTPUT
          echo "✅ Releasing: ${VERSION_TAG}"

      - name: Bump Cargo.toml version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          awk -v ver="$VERSION" '
            BEGIN { in_package = 0 }
            /^\[package\]/ { in_package = 1; print; next }
            in_package && /^\[/ { in_package = 0 }
            in_package && /^version = / { print "version = \"" ver "\""; next }
            { print }
          ' Cargo.toml > Cargo.toml.tmp && mv Cargo.toml.tmp Cargo.toml
          ACTUAL=$(grep -A 5 '^\[package\]' Cargo.toml | grep '^version = ' | head -1 | sed -E 's/^version = "([^"]+)".*/\1/')
          [ "$ACTUAL" = "$VERSION" ] || { echo "❌ Version bump failed"; exit 1; }
          echo "✅ Cargo.toml bumped to ${VERSION}"

      - name: Install packaging tools and Windows cross-compiler
        run: |
          if command -v apt-get >/dev/null 2>&1; then
            bash scripts/apt-get-retry.sh update -qq
            bash scripts/apt-get-retry.sh install -y -qq \
              gcc-mingw-w64-x86-64 binutils-mingw-w64-x86-64 \
              rpm dpkg-dev fakeroot
          fi
          export PATH="$HOME/.cargo/bin:$PATH"
          cargo install cargo-deb --locked --quiet || true
          cargo install cargo-generate-rpm --locked --quiet || true
          rustup target add x86_64-pc-windows-gnu

      - name: Build Linux x86_64 release binary
        id: build_linux
        env:
          CARGO_BUILD_JOBS: 8
        run: |
          export CARGO_TARGET_DIR=/tmp/gh-blvm-release-build/${{ github.run_id }}/target
          unset CC CXX CPP AR || true
          cargo build --release
          VERSION="${{ steps.version.outputs.version }}"
          cp /tmp/gh-blvm-release-build/${{ github.run_id }}/target/release/blvm ./blvm-${VERSION}-linux-x86_64
          echo "✅ Linux binary: $(file blvm-${VERSION}-linux-x86_64)"
          echo "filename=blvm-${VERSION}-linux-x86_64" >> $GITHUB_OUTPUT

      - name: Build Windows x86_64 release binary
        id: build_windows
        env:
          CARGO_TARGET_X86_64_PC_WINDOWS_GNU_LINKER: x86_64-w64-mingw32-gcc
          CC_x86_64_pc_windows_gnu: x86_64-w64-mingw32-gcc
          CXX_x86_64_pc_windows_gnu: x86_64-w64-mingw32-g++
          PKG_CONFIG_ALLOW_CROSS: "1"
          CARGO_BUILD_JOBS: 8
        run: |
          unset CC CXX CPP AR || true
          export CARGO_TARGET_DIR=/tmp/gh-blvm-release-build/${{ github.run_id }}/target
          VERSION="${{ steps.version.outputs.version }}"
          echo "=== Windows cross-compile (pure-Rust features, no zmq/rocksdb/nix/libc) ==="
          cargo build --release \
            --target x86_64-pc-windows-gnu \
            --no-default-features \
            --features "blvm-node/sled,blvm-node/redb,blvm-node/production,blvm-node/protocol-verification,blvm-node/utxo-commitments" \
            2>&1 || { echo "❌ Windows cross-compile failed (see above)"; exit 1; }
          EXE=/tmp/gh-blvm-release-build/${{ github.run_id }}/target/x86_64-pc-windows-gnu/release/blvm.exe
          if [ -f "$EXE" ]; then
            cp "$EXE" ./blvm-${VERSION}-windows-x86_64.exe
            echo "✅ Windows binary: $(ls -lh blvm-${VERSION}-windows-x86_64.exe)"
            echo "built=true" >> $GITHUB_OUTPUT
            echo "filename=blvm-${VERSION}-windows-x86_64.exe" >> $GITHUB_OUTPUT
          else
            echo "❌ .exe not found after build"
            echo "built=false" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Package .deb (Debian/Ubuntu)
        id: build_deb
        continue-on-error: true
        run: |
          TARGET_DIR=/tmp/gh-blvm-release-build/${{ github.run_id }}/target
          VERSION="${{ steps.version.outputs.version }}"
          # cargo deb --no-build resolves asset paths relative to workspace root (./target/release/blvm).
          # Copy the already-built binary there so it can find it.
          mkdir -p target/release
          cp "${TARGET_DIR}/release/blvm" target/release/blvm
          cargo deb --no-build 2>&1
          DEB=$(find target/debian -name "*.deb" 2>/dev/null | head -1)
          if [ -n "$DEB" ]; then
            DEBNAME="blvm_${VERSION}_amd64.deb"
            cp "$DEB" "./${DEBNAME}"
            echo "✅ .deb: ${DEBNAME}"
            echo "built=true" >> $GITHUB_OUTPUT
            echo "filename=${DEBNAME}" >> $GITHUB_OUTPUT
          else
            echo "⚠️  .deb not produced"
            echo "built=false" >> $GITHUB_OUTPUT
          fi

      - name: Package .rpm (RHEL/Fedora)
        id: build_rpm
        continue-on-error: true
        run: |
          export CARGO_TARGET_DIR=/tmp/gh-blvm-release-build/${{ github.run_id }}/target
          VERSION="${{ steps.version.outputs.version }}"
          cargo generate-rpm --target-dir /tmp/gh-blvm-release-build/${{ github.run_id }}/target 2>&1
          RPM=$(find /tmp/gh-blvm-release-build/${{ github.run_id }}/target -name "*.rpm" | head -1)
          if [ -n "$RPM" ]; then
            RPMNAME="blvm-${VERSION}-1.x86_64.rpm"
            cp "$RPM" "./${RPMNAME}"
            echo "✅ .rpm: ${RPMNAME}"
            echo "built=true" >> $GITHUB_OUTPUT
            echo "filename=${RPMNAME}" >> $GITHUB_OUTPUT
          else
            echo "⚠️  .rpm not produced"
            echo "built=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate combined checksums
        id: checksums
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          > checksums.sha256
          for f in \
            blvm-${VERSION}-linux-x86_64 \
            blvm-${VERSION}-windows-x86_64.exe \
            blvm_${VERSION}_amd64.deb \
            blvm-${VERSION}-1.x86_64.rpm; do
            [ -f "$f" ] && sha256sum "$f" >> checksums.sha256
          done
          echo "=== checksums.sha256 ==="
          cat checksums.sha256

      - name: Stage release artifacts
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p release-artifacts
          for f in \
            blvm-${VERSION}-linux-x86_64 \
            blvm-${VERSION}-windows-x86_64.exe \
            blvm_${VERSION}_amd64.deb \
            blvm-${VERSION}-1.x86_64.rpm \
            checksums.sha256; do
            [ -f "$f" ] && cp "$f" release-artifacts/
          done
          echo "=== staged artifacts ==="
          ls -lh release-artifacts/

      - name: Create and push version tag
        run: |
          VERSION_TAG="${{ steps.version.outputs.version_tag }}"
          git config user.email "ci@btcdecoded.com"
          git config user.name "BLVM CI"
          if git rev-parse "$VERSION_TAG" >/dev/null 2>&1; then
            echo "⚠️  Tag ${VERSION_TAG} already exists, skipping"
          else
            git tag -a "$VERSION_TAG" -m "Release ${VERSION_TAG}"
            git push origin "$VERSION_TAG"
            echo "✅ Created and pushed tag ${VERSION_TAG}"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.version_tag }}
          name: blvm ${{ steps.version.outputs.version_tag }}
          body: |
            **Bitcoin Commons BLVM** — Bitcoin Low-Level Virtual Machine node CLI.

            > [!NOTE]
            > Verify your download against `checksums.sha256` before running.

            ## Downloads

            | Platform | File | Notes |
            |---|---|---|
            | **Linux x86_64** (binary) | `blvm-${{ steps.version.outputs.version }}-linux-x86_64` | Full features |
            | **Linux x86_64** (Debian/Ubuntu) | `blvm_${{ steps.version.outputs.version }}_amd64.deb` | dpkg install |
            | **Linux x86_64** (RHEL/Fedora) | `blvm-${{ steps.version.outputs.version }}-1.x86_64.rpm` | rpm install |
            | **Windows x86_64** | `blvm-${{ steps.version.outputs.version }}-windows-x86_64.exe` | Core features |
            | **Checksums** | `checksums.sha256` | SHA-256 for all artifacts |

            ## Verify

            ```bash
            sha256sum -c checksums.sha256
            ```

            ## Install

            **Linux (binary):**
            ```bash
            curl -LO https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.version_tag }}/blvm-${{ steps.version.outputs.version }}-linux-x86_64
            curl -LO https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.version_tag }}/checksums.sha256
            sha256sum -c checksums.sha256
            chmod +x blvm-${{ steps.version.outputs.version }}-linux-x86_64
            sudo mv blvm-${{ steps.version.outputs.version }}-linux-x86_64 /usr/local/bin/blvm
            ```

            **Debian/Ubuntu:**
            ```bash
            curl -LO https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.version_tag }}/blvm_${{ steps.version.outputs.version }}_amd64.deb
            sudo dpkg -i blvm_${{ steps.version.outputs.version }}_amd64.deb
            ```

            **RHEL/Fedora:**
            ```bash
            curl -LO https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.version_tag }}/blvm-${{ steps.version.outputs.version }}-1.x86_64.rpm
            sudo rpm -i blvm-${{ steps.version.outputs.version }}-1.x86_64.rpm
            ```

            **Windows:** Download `blvm-${{ steps.version.outputs.version }}-windows-x86_64.exe`, verify checksum, and run from a terminal.

            ## Changes

            See [commit history](https://github.com/${{ github.repository }}/compare/${{ github.event.before }}...${{ github.sha }})
          files: release-artifacts/*
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version_tag, '-unverified') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup release build dir
        if: always()
        run: rm -rf /tmp/gh-blvm-release-build/${{ github.run_id }} || true

  # Sends repository_dispatch(blvm-release) to BTCDecoded/website and
  # BTCDecoded/commons-website so both refresh install/blvm version metadata.
  # Org secret on this repo: WEBSITE_REPO_DISPATCH_TOKEN — PAT must be able to
  # dispatch workflows on both repos (classic `repo` or fine-grained on each).
  notify-website-deploy:
    name: Dispatch marketing site rebuilds
    needs: release
    runs-on: ubuntu-latest
    if: ${{ always() && needs.release.result == 'success' }}
    steps:
      - name: repository_dispatch(blvm-release) → website & commons-website
        env:
          TOKEN: ${{ secrets.WEBSITE_REPO_DISPATCH_TOKEN }}
          VERSION_TAG: ${{ needs.release.outputs.version_tag }}
          SOURCE_REPO: ${{ github.repository }}
        run: |
          if [ -z "${TOKEN:-}" ]; then
            echo "::notice::WEBSITE_REPO_DISPATCH_TOKEN is not set — skipping marketing site dispatch."
            exit 0
          fi
          BODY=$(jq -nc --arg t "${VERSION_TAG}" --arg r "${SOURCE_REPO}" \
            '{"event_type":"blvm-release","client_payload":{"tag":$t,"source_repo":$r}}')
          for REPO in website commons-website; do
            echo "Dispatching blvm-release → BTCDecoded/${REPO} …"
            curl -fsSL -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/BTCDecoded/${REPO}/dispatches" \
              -d "${BODY}"
          done

  docker-ghcr:
    name: Publish container (GHCR)
    needs: [setup, release]
    runs-on: [self-hosted, Linux, X64, builds]
    permissions:
      contents: read
      packages: write
    # Any successful `release` job (push, manual workflow_dispatch, etc.): publish image.
    # Do not gate on `github.event_name == 'push'` — that skipped GHCR on manual runs.
    if: |
      always() &&
      needs.setup.result == 'success' &&
      needs.release.result == 'success' &&
      !contains(needs.setup.outputs.commit_msg_bundle, '[skip_docker]') &&
      (github.event.head_commit == null || !contains(github.event.head_commit.message, '[skip_docker]'))
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.version_tag }}
          fetch-depth: 0

      - name: Strip [patch.crates-io] for crates.io-only build (matches CI)
        uses: BTCDecoded/rust-ci/strip-patch-crates-io@main

      - name: Regenerate Cargo.lock without path patches
        run: cargo generate-lockfile

      - name: Set GHCR image name (must be lowercase)
        id: ghcr
        run: |
          R='${{ github.repository }}'
          echo "image=ghcr.io/${R,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.ghcr.outputs.image }}
          tags: |
            type=raw,value=${{ needs.release.outputs.version }}
            type=raw,value=latest,enable=${{ !contains(needs.release.outputs.version_tag, 'unverified') }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  teardown:
    name: Teardown (cleanup runner disk)
    runs-on: [self-hosted, Linux, X64, builds]
    if: always()
    needs:
      - setup
      - build-dev
      - test
      - clippy
      - fmt
      - docs
      - security
      - build
    steps:
      - name: Delete this run CI target dir
        run: |
          RUN_DIR="/tmp/gh-blvm-build/${{ github.run_id }}"
          if [ -d "$RUN_DIR" ]; then
            echo "Removing $RUN_DIR ($(du -sh "$RUN_DIR" 2>/dev/null | cut -f1))"
            rm -rf "$RUN_DIR"
          fi
          find /tmp/gh-blvm-build -mindepth 1 -maxdepth 1 -type d \
            -exec rm -rf {} + 2>/dev/null || true
          echo "=== disk after teardown ==="
          df -h /
