name: CI

# PRs (→ main or develop): quality gates only — no release, nightly-release, or GHCR publish.
# Commit message skip tokens (push only): [skip_tests], [skip_docs], [skip_fuzz], [skip_security], [skip_release], [skip_verify], [skip_docker]
# [skip_docs] also skips clippy and fmt.
# [skip_verify] skips the release-profile build job (cargo build --release).
# [skip_release] prevents the release job (main) and nightly-release job (develop) from running.
# [skip_publish_dev] skips crates.io develop publish; nightly falls back to main/stable crates if dev set missing.
# [skip_docker] skips GHCR publish (docker-ghcr on main, docker-ghcr-nightly on develop).
# Tokens are matched against setup.commit_msg_bundle (git log range) plus head_commit when set.
#
# GHCR auth: use github.token (same credential as secrets.GITHUB_TOKEN — automatic per-run token).

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  release:
    types: [published]
  repository_dispatch:
    types: [build-chain, upstream-changed, develop-chain]
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip test execution and build steps'
        required: false
        type: boolean
        default: false
      force_version:
        description: 'Coordinated develop V (e.g. 0.1.22-dev.3); empty = compute from crates.io'
        required: false
        type: string
        default: ''
      skip_publish_dev:
        description: 'Skip crates.io develop publish (verify/wait for V on index only)'
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  actions: write
  packages: write # GHCR: docker-ghcr job pushes container images

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: '1'
  CARGO_INCREMENTAL: '0'
  BLVM_BUILD_TARGET: /tmp/gh-blvm-build/${{ github.run_id }}/target

jobs:
  setup:
    name: Setup
    runs-on: [self-hosted, Linux, X64, builds]
    if: |
      (github.event_name != 'push' || github.event.head_commit == null ||
       (!contains(github.event.head_commit.message, '[skip ci]') &&
        !contains(github.event.head_commit.message, '[ci skip]') &&
        !contains(github.event.head_commit.message, '[no ci]')))
    outputs:
      cache-key: ${{ steps.setup-cache.outputs.cache-key }}
      commit_msg_bundle: ${{ steps.commit-msg-bundle.outputs.bundle }}
    steps:
      - name: Emergency pre-flight disk cleanup
        run: |
          df -h /
          if [ -d /tmp/gh-blvm-build ]; then
            find /tmp/gh-blvm-build -mindepth 1 -maxdepth 1 -type d \
              -not -name "${{ github.run_id }}" \
              -mmin +60 \
              -exec rm -rf {} + 2>/dev/null || true
            USED=$(du -sb /tmp/gh-blvm-build 2>/dev/null | cut -f1 || echo 0)
            if [ "$USED" -gt 53687091200 ]; then
              find /tmp/gh-blvm-build -mindepth 1 -maxdepth 1 -type d \
                -not -name "${{ github.run_id }}" \
                -exec rm -rf {} + 2>/dev/null || true
            fi
          fi

      - name: Disk check
        uses: BTCDecoded/rust-ci/runner-disk-guard@main

      - uses: actions/checkout@v6

      - name: Strip [patch.crates-io] for crates.io-only CI
        uses: BTCDecoded/rust-ci/strip-patch-crates-io@main

      - name: Commit message bundle (push payloads often omit head_commit)
        id: commit-msg-bundle
        shell: bash
        run: |
          echo 'bundle<<COMMIT_MSG_BUNDLE_EOF' >> "$GITHUB_OUTPUT"
          if [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            BEFORE="${{ github.event.before }}"
            AFTER="${{ github.sha }}"
            if [ -n "$BEFORE" ] && [ "$BEFORE" != "0000000000000000000000000000000000000000" ]; then
              git log --pretty=%B "${BEFORE}..${AFTER}" 2>/dev/null || git log -1 --pretty=%B
            else
              git log -1 --pretty=%B
            fi
          fi
          echo 'COMMIT_MSG_BUNDLE_EOF' >> "$GITHUB_OUTPUT"

      - name: Cache key
        id: setup-cache
        run: |
          CACHE_ROOT="/tmp/runner-cache/${{ github.repository }}"
          # blvm commits Cargo.lock — use it for cache key
          DEPS_KEY=$(sha256sum Cargo.lock | cut -d' ' -f1)
          TOOLCHAIN=$(grep -E '^channel|rust-version' rust-toolchain.toml Cargo.toml 2>/dev/null | head -1 | sha256sum | cut -d' ' -f1 || echo "stable")
          CACHE_KEY="${DEPS_KEY}-${TOOLCHAIN}"
          CARGO_CACHE_DIR="$CACHE_ROOT/cargo/$CACHE_KEY"
          TARGET_CACHE_DIR="$CACHE_ROOT/target/$CACHE_KEY"
          echo "CARGO_CACHE_DIR=$CARGO_CACHE_DIR" >> $GITHUB_ENV
          echo "TARGET_CACHE_DIR=$TARGET_CACHE_DIR" >> $GITHUB_ENV
          echo "cache-key=$CACHE_KEY" >> $GITHUB_OUTPUT
          mkdir -p "$CARGO_CACHE_DIR"/{registry,git} "$TARGET_CACHE_DIR"

      - name: Install Rust
        uses: BTCDecoded/rust-ci/install-rust-toolchain@main


  test:
    name: Test
    needs: setup
    runs-on: [self-hosted, Linux, X64, builds]
    if: |
      (github.event_name != 'push' || github.event.head_commit == null ||
       (!contains(github.event.head_commit.message, '[skip ci]') &&
        !contains(github.event.head_commit.message, '[ci skip]') &&
        !contains(github.event.head_commit.message, '[no ci]'))) &&
      (github.event_name != 'push' || github.event.head_commit == null ||
       !contains(github.event.head_commit.message, '[skip_tests]')) &&
      (github.event_name != 'workflow_dispatch' || github.event.inputs.skip_tests != 'true')
    steps:
      - uses: actions/checkout@v6

      - name: Strip [patch.crates-io] for crates.io-only CI
        uses: BTCDecoded/rust-ci/strip-patch-crates-io@main

      - name: Clean leftover path overrides
        run: |
          if [ -d "../blvm-node" ]; then rm -rf ../blvm-node; fi
          if [ -d "../blvm-protocol" ]; then rm -rf ../blvm-protocol; fi
          if [ -d "../blvm-consensus" ]; then rm -rf ../blvm-consensus; fi
          if [ -f ".cargo/config.toml" ]; then rm -f .cargo/config.toml; fi

      - name: Resolve develop registry deps (test)
        if: github.ref == 'refs/heads/develop' || github.base_ref == 'develop'
        run: |
          chmod +x scripts/resolve-develop-registry-deps.sh scripts/resolve-develop-registry-deps.py
          bash scripts/resolve-develop-registry-deps.sh --mode resolve Cargo.toml || true

      - name: Install OpenSSL development headers
        run: |
          if command -v apt-get >/dev/null 2>&1; then
            bash scripts/apt-get-retry.sh update -qq
            bash scripts/apt-get-retry.sh install -y -qq pkg-config libssl-dev
          elif command -v pacman >/dev/null 2>&1; then
            pacman -Qq openssl pkgconf >/dev/null 2>&1 || sudo pacman -Sy --noconfirm openssl pkgconf
          fi

      - name: Isolate CARGO_HOME for this runner
        run: |
          mkdir -p "${RUNNER_TEMP}/cargo"
          echo "CARGO_HOME=${RUNNER_TEMP}/cargo" >> "$GITHUB_ENV"

      - name: Cache
        uses: BTCDecoded/rust-ci/runner-cargo-cache@main
        with:
          operation: bind-env
          cache-key: ${{ needs.setup.outputs.cache-key }}

      - name: Restore Cargo cache
        uses: BTCDecoded/rust-ci/runner-cargo-cache@main
        with:
          operation: restore

      - name: Install Rust
        uses: BTCDecoded/rust-ci/install-rust-toolchain@main

      - name: Run tests
        env:
          CARGO_TARGET_DIR: ${{ env.BLVM_BUILD_TARGET }}
        run: |
          unset CC CXX CPP AR || true
          cargo test --lib --bins --tests

      - name: Dump disk usage on failure
        if: failure()
        run: |
          df -h /
          du -sh /tmp/gh-blvm-build/* 2>/dev/null | sort -rh | head -10

      - name: Clean test executables and stale run dirs
        if: always()
        run: |
          TARGET="${{ env.BLVM_BUILD_TARGET }}"
          if [ -d "$TARGET/debug" ]; then
            find "$TARGET/debug" -maxdepth 1 -type f -executable ! -name "*.so" ! -name "*.rlib" ! -name "*.d" \
              -delete 2>/dev/null || true
          fi
          find /tmp/gh-blvm-build -mindepth 1 -maxdepth 1 -type d \
            -not -name "${{ github.run_id }}" \
            -exec rm -rf {} + 2>/dev/null || true

      - name: Save Cargo cache
        if: always()
        uses: BTCDecoded/rust-ci/runner-cargo-cache@main
        with:
          operation: save

      - name: Prune old runner caches
        if: always()
        uses: BTCDecoded/rust-ci/runner-cargo-cache@main
        with:
          operation: prune

  clippy:
    name: Clippy
    needs: setup
    runs-on: [self-hosted, Linux, X64, builds]
    if: |
      (github.event_name != 'push' || github.event.head_commit == null ||
       (!contains(github.event.head_commit.message, '[skip ci]') &&
        !contains(github.event.head_commit.message, '[ci skip]') &&
        !contains(github.event.head_commit.message, '[no ci]'))) &&
      (github.event_name != 'push' || github.event.head_commit == null ||
       !contains(github.event.head_commit.message, '[skip_tests]')) &&
      (github.event_name != 'push' || github.event.head_commit == null ||
       !contains(github.event.head_commit.message, '[skip_docs]')) &&
      (github.event_name != 'workflow_dispatch' || github.event.inputs.skip_tests != 'true')
    steps:
      - uses: actions/checkout@v6

      - name: Strip [patch.crates-io] for crates.io-only CI
        uses: BTCDecoded/rust-ci/strip-patch-crates-io@main

      - name: Clean leftover path overrides
        run: |
          if [ -d "../blvm-node" ]; then rm -rf ../blvm-node; fi
          if [ -d "../blvm-protocol" ]; then rm -rf ../blvm-protocol; fi
          if [ -d "../blvm-consensus" ]; then rm -rf ../blvm-consensus; fi
          if [ -f ".cargo/config.toml" ]; then rm -f .cargo/config.toml; fi

      - name: Install OpenSSL development headers
        run: |
          if command -v apt-get >/dev/null 2>&1; then
            bash scripts/apt-get-retry.sh update -qq
            bash scripts/apt-get-retry.sh install -y -qq pkg-config libssl-dev
          elif command -v pacman >/dev/null 2>&1; then
            pacman -Qq openssl pkgconf >/dev/null 2>&1 || sudo pacman -Sy --noconfirm openssl pkgconf
          fi

      - name: Isolate CARGO_HOME for this runner
        run: |
          mkdir -p "${RUNNER_TEMP}/cargo"
          echo "CARGO_HOME=${RUNNER_TEMP}/cargo" >> "$GITHUB_ENV"

      - name: Cache
        uses: BTCDecoded/rust-ci/runner-cargo-cache@main
        with:
          operation: bind-env
          cache-key: ${{ needs.setup.outputs.cache-key }}
          include-target: false

      - name: Restore Cargo cache
        uses: BTCDecoded/rust-ci/runner-cargo-cache@main
        with:
          operation: restore

      - name: Install Rust
        uses: BTCDecoded/rust-ci/install-rust-toolchain@main

      # Integration tests: compiled in the `test` job. Clippy matches blvm-node CI: lib + bins only
      # (strict `uninlined_format_args` + warnings); `tests/*.rs` are not linted as separate crates here.
      - name: Clippy (default features)
        env:
          CARGO_TARGET_DIR: ${{ env.BLVM_BUILD_TARGET }}
        run: cargo clippy --lib --bins -- -D clippy::uninlined_format_args -D warnings

      - name: Clippy (all features, incremental)
        env:
          CARGO_TARGET_DIR: ${{ env.BLVM_BUILD_TARGET }}
        run: cargo clippy --lib --bins --all-features -- -D clippy::uninlined_format_args -D warnings

  fmt:
    name: Format
    needs: setup
    runs-on: [self-hosted, Linux, X64, builds]
    if: |
      (github.event_name != 'push' || github.event.head_commit == null ||
       (!contains(github.event.head_commit.message, '[skip ci]') &&
        !contains(github.event.head_commit.message, '[ci skip]') &&
        !contains(github.event.head_commit.message, '[no ci]'))) &&
      (github.event_name != 'push' || github.event.head_commit == null ||
       !contains(github.event.head_commit.message, '[skip_tests]')) &&
      (github.event_name != 'push' || github.event.head_commit == null ||
       !contains(github.event.head_commit.message, '[skip_docs]')) &&
      (github.event_name != 'workflow_dispatch' || github.event.inputs.skip_tests != 'true')
    steps:
      - uses: actions/checkout@v6

      - name: Strip [patch.crates-io] for crates.io-only CI
        uses: BTCDecoded/rust-ci/strip-patch-crates-io@main

      - name: Install Rust
        uses: BTCDecoded/rust-ci/install-rust-toolchain@main

      - name: Check formatting
        run: cargo fmt --all -- --check

  docs:
    name: Docs
    needs: setup
    runs-on: [self-hosted, Linux, X64, builds]
    if: |
      (github.event_name != 'push' || github.event.head_commit == null ||
       (!contains(github.event.head_commit.message, '[skip ci]') &&
        !contains(github.event.head_commit.message, '[ci skip]') &&
        !contains(github.event.head_commit.message, '[no ci]'))) &&
      (github.event_name != 'push' || github.event.head_commit == null ||
       !contains(github.event.head_commit.message, '[skip_docs]')) &&
      (github.event_name != 'workflow_dispatch' || github.event.inputs.skip_tests != 'true')
    steps:
      - uses: actions/checkout@v6

      - name: Strip [patch.crates-io] for crates.io-only CI
        uses: BTCDecoded/rust-ci/strip-patch-crates-io@main

      - name: Clean leftover path overrides
        run: |
          if [ -d "../blvm-node" ]; then rm -rf ../blvm-node; fi
          if [ -d "../blvm-protocol" ]; then rm -rf ../blvm-protocol; fi
          if [ -d "../blvm-consensus" ]; then rm -rf ../blvm-consensus; fi
          if [ -f ".cargo/config.toml" ]; then rm -f .cargo/config.toml; fi

      - name: Isolate CARGO_HOME for this runner
        run: |
          mkdir -p "${RUNNER_TEMP}/cargo"
          echo "CARGO_HOME=${RUNNER_TEMP}/cargo" >> "$GITHUB_ENV"

      - name: Cache
        uses: BTCDecoded/rust-ci/runner-cargo-cache@main
        with:
          operation: bind-env
          cache-key: ${{ needs.setup.outputs.cache-key }}
          include-target: false

      - name: Restore Cargo cache
        uses: BTCDecoded/rust-ci/runner-cargo-cache@main
        with:
          operation: restore

      - name: Install Rust
        uses: BTCDecoded/rust-ci/install-rust-toolchain@main

      - name: Build docs
        run: cargo doc --no-deps --document-private-items

  security:
    name: Security
    needs: setup
    runs-on: [self-hosted, Linux, X64, builds]
    if: |
      (github.event_name != 'push' || github.event.head_commit == null ||
       (!contains(github.event.head_commit.message, '[skip ci]') &&
        !contains(github.event.head_commit.message, '[ci skip]') &&
        !contains(github.event.head_commit.message, '[no ci]'))) &&
      (github.event_name != 'push' || github.event.head_commit == null ||
       !contains(github.event.head_commit.message, '[skip_tests]')) &&
      (github.event_name != 'push' || github.event.head_commit == null ||
       !contains(github.event.head_commit.message, '[skip_security]')) &&
      (github.event_name != 'workflow_dispatch' || github.event.inputs.skip_tests != 'true')
    steps:
      - uses: actions/checkout@v6

      - name: Strip [patch.crates-io] for crates.io-only CI
        uses: BTCDecoded/rust-ci/strip-patch-crates-io@main

      - name: Install Rust
        uses: BTCDecoded/rust-ci/install-rust-toolchain@main

      - name: Install cargo-audit
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          cargo install cargo-audit --version 0.22.1 --locked

      - name: Run security audit
        run: cargo audit

  build:
    name: Build (release)
    needs:
      - setup
      - test
      - clippy
      - fmt
      - docs
      - security
    runs-on: [self-hosted, Linux, X64, builds]
    if: |
      always() &&
      needs.setup.result == 'success' &&
      (github.event_name == 'push' || github.event_name == 'release' || github.event_name == 'repository_dispatch' || github.event_name == 'workflow_dispatch') &&
      (github.event_name != 'push' || github.event.head_commit == null ||
       (!contains(github.event.head_commit.message, '[skip ci]') &&
        !contains(github.event.head_commit.message, '[ci skip]') &&
        !contains(github.event.head_commit.message, '[no ci]'))) &&
      ((github.event_name == 'workflow_dispatch' && github.event.inputs.skip_tests == 'true') ||
       ((needs.test.result == 'success' || needs.test.result == 'skipped') &&
        (needs.clippy.result == 'success' || needs.clippy.result == 'skipped') &&
        (needs.fmt.result == 'success' || needs.fmt.result == 'skipped') &&
        (needs.docs.result == 'success' || needs.docs.result == 'skipped') &&
        (needs.security.result == 'success' || needs.security.result == 'skipped')))
    steps:
      - uses: actions/checkout@v6

      - name: Strip [patch.crates-io] for crates.io-only CI
        uses: BTCDecoded/rust-ci/strip-patch-crates-io@main

      - name: Clean leftover path overrides
        run: |
          if [ -d "../blvm-node" ]; then rm -rf ../blvm-node; fi
          if [ -d "../blvm-protocol" ]; then rm -rf ../blvm-protocol; fi
          if [ -d "../blvm-consensus" ]; then rm -rf ../blvm-consensus; fi
          if [ -f ".cargo/config.toml" ]; then rm -f .cargo/config.toml; fi

      - name: Install OpenSSL development headers
        run: |
          if command -v apt-get >/dev/null 2>&1; then
            bash scripts/apt-get-retry.sh update -qq
            bash scripts/apt-get-retry.sh install -y -qq pkg-config libssl-dev
          elif command -v pacman >/dev/null 2>&1; then
            pacman -Qq openssl pkgconf >/dev/null 2>&1 || sudo pacman -Sy --noconfirm openssl pkgconf
          fi

      - name: Isolate CARGO_HOME for this runner
        run: |
          mkdir -p "${RUNNER_TEMP}/cargo"
          echo "CARGO_HOME=${RUNNER_TEMP}/cargo" >> "$GITHUB_ENV"

      - name: Cache
        uses: BTCDecoded/rust-ci/runner-cargo-cache@main
        with:
          operation: bind-env
          cache-key: ${{ needs.setup.outputs.cache-key }}

      - name: Restore Cargo cache
        uses: BTCDecoded/rust-ci/runner-cargo-cache@main
        with:
          operation: restore

      - name: Install Rust
        uses: BTCDecoded/rust-ci/install-rust-toolchain@main

      - name: Build release
        env:
          CARGO_BUILD_JOBS: 8
        run: |
          # Runner sometimes exports CC= globally; cc-rs treats that as set-but-empty and
          # -sys crates fail to compile bundled C (zstd-sys, lz4-sys, rocksdb, etc.).
          # --locked is omitted: strip-patch-crates-io removes [patch.crates-io] so the
          # committed Cargo.lock has no registry source for patched crates; cargo must
          # re-resolve from crates.io before building.
          unset CC CXX CPP AR || true
          cargo build --release

      - name: Dump disk usage on failure
        if: failure()
        run: df -h /

      - name: Save Cargo cache
        if: always()
        uses: BTCDecoded/rust-ci/runner-cargo-cache@main
        with:
          operation: save

      - name: Prune old runner caches
        if: always()
        uses: BTCDecoded/rust-ci/runner-cargo-cache@main
        with:
          operation: prune

  release:
    name: Release
    needs: [setup, build, test, clippy, fmt, docs, security]
    runs-on: [self-hosted, Linux, X64, builds]
    permissions:
      contents: write
      id-token: write
      attestations: write
    if: |
      always() &&
      needs.setup.result == 'success' &&
      needs.build.result == 'success' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') &&
      !contains(needs.setup.outputs.commit_msg_bundle, '[skip ci]') &&
      (github.event.head_commit == null || !contains(github.event.head_commit.message, '[skip ci]')) &&
      !contains(needs.setup.outputs.commit_msg_bundle, '[ci skip]') &&
      (github.event.head_commit == null || !contains(github.event.head_commit.message, '[ci skip]')) &&
      !contains(needs.setup.outputs.commit_msg_bundle, '[no ci]') &&
      (github.event.head_commit == null || !contains(github.event.head_commit.message, '[no ci]')) &&
      !contains(needs.setup.outputs.commit_msg_bundle, '[skip_release]') &&
      (github.event.head_commit == null || !contains(github.event.head_commit.message, '[skip_release]')) &&
      ((github.event_name == 'workflow_dispatch' && github.event.inputs.skip_tests == 'true') ||
       (
         (needs.test.result == 'success' || (needs.test.result == 'skipped' && (contains(needs.setup.outputs.commit_msg_bundle, '[skip_tests]') || (github.event.head_commit != null && contains(github.event.head_commit.message, '[skip_tests]'))))) &&
         (needs.clippy.result == 'success' || (needs.clippy.result == 'skipped' && (contains(needs.setup.outputs.commit_msg_bundle, '[skip_docs]') || contains(needs.setup.outputs.commit_msg_bundle, '[skip_tests]') || (github.event.head_commit != null && (contains(github.event.head_commit.message, '[skip_docs]') || contains(github.event.head_commit.message, '[skip_tests]')))))) &&
         (needs.fmt.result == 'success' || (needs.fmt.result == 'skipped' && (contains(needs.setup.outputs.commit_msg_bundle, '[skip_docs]') || contains(needs.setup.outputs.commit_msg_bundle, '[skip_tests]') || (github.event.head_commit != null && (contains(github.event.head_commit.message, '[skip_docs]') || contains(github.event.head_commit.message, '[skip_tests]')))))) &&
         (needs.docs.result == 'success' || (needs.docs.result == 'skipped' && (contains(needs.setup.outputs.commit_msg_bundle, '[skip_docs]') || contains(needs.setup.outputs.commit_msg_bundle, '[skip_tests]') || (github.event.head_commit != null && (contains(github.event.head_commit.message, '[skip_docs]') || contains(github.event.head_commit.message, '[skip_tests]')))))) &&
         (needs.security.result == 'success' || (needs.security.result == 'skipped' && (contains(needs.setup.outputs.commit_msg_bundle, '[skip_security]') || contains(needs.setup.outputs.commit_msg_bundle, '[skip_tests]') || (github.event.head_commit != null && (contains(github.event.head_commit.message, '[skip_security]') || contains(github.event.head_commit.message, '[skip_tests]'))))))
       ))
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    outputs:
      version: ${{ steps.version.outputs.version }}
      version_tag: ${{ steps.version.outputs.version_tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Strip [patch.crates-io] for crates.io-only CI
        uses: BTCDecoded/rust-ci/strip-patch-crates-io@main

      - name: Install OpenSSL development headers
        run: |
          if command -v apt-get >/dev/null 2>&1; then
            bash scripts/apt-get-retry.sh update -qq
            bash scripts/apt-get-retry.sh install -y -qq pkg-config libssl-dev
          elif command -v pacman >/dev/null 2>&1; then
            pacman -Qq openssl pkgconf >/dev/null 2>&1 || sudo pacman -Sy --noconfirm openssl pkgconf
          fi

      - name: Install Rust
        uses: BTCDecoded/rust-ci/install-rust-toolchain@main

      - name: Determine version
        id: version
        run: |
          CURRENT=$(grep -A 10 '^\[package\]' Cargo.toml | grep '^version = ' | head -1 | sed -E 's/^version = "([^"]+)".*/\1/')
          if [ -z "$CURRENT" ]; then
            echo "❌ Could not determine current version from Cargo.toml"
            exit 1
          fi
          echo "Current version: ${CURRENT}"
          if ! echo "$CURRENT" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "❌ Invalid version format: ${CURRENT}"
            exit 1
          fi
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          CURRENT_PATCH=$(echo "$CURRENT" | cut -d. -f3)

          # Collect already-used versions from two sources:
          # 1. Git tags (primary — always accurate, works even if crate is never published)
          TAGGED_VERSIONS=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' | sed 's/^v//' | sed 's/-unverified$//')
          echo "Git-tagged versions: $(echo "$TAGGED_VERSIONS" | tr '\n' ' ')"

          # 2. crates.io (secondary — catches versions published by other means)
          API_RESPONSE=$(curl -sf \
            -H "User-Agent: blvm-ci/1.0 (github.com/BTCDecoded/blvm)" \
            "https://crates.io/api/v1/crates/blvm/versions" 2>/dev/null || echo "")
          CRATES_VERSIONS=""
          if [ -n "$API_RESPONSE" ] && ! echo "$API_RESPONSE" | grep -q '"detail"'; then
            if command -v jq &>/dev/null; then
              CRATES_VERSIONS=$(echo "$API_RESPONSE" | jq -r '.versions[].num' 2>/dev/null || echo "")
            else
              CRATES_VERSIONS=$(echo "$API_RESPONSE" | grep -oE '"num":"[^"]+"' | sed 's/"num":"//;s/"//')
            fi
          fi

          # Combined list — version is taken if it appears in either source
          USED_VERSIONS=$(printf '%s\n%s' "$TAGGED_VERSIONS" "$CRATES_VERSIONS" | sort -u | grep -v '^$')
          echo "All used versions: $(echo "$USED_VERSIONS" | tr '\n' ' ')"

          # Next patch: max(Cargo.toml, all used X.Y.* on this MAJOR.MINOR) + 1 — not "current+1" then walk.
          SAME_LINE_PATCHES=$(printf '%s\n' "$USED_VERSIONS" | grep -E "^${MAJOR}\\.${MINOR}\\.[0-9]+$" | cut -d. -f3 || true)
          MAX_PATCH=$(printf '%s\n' $SAME_LINE_PATCHES "$CURRENT_PATCH" | grep -E '^[0-9]+$' | sort -n | tail -1)
          [ -n "$MAX_PATCH" ] || MAX_PATCH="$CURRENT_PATCH"
          PATCH=$((MAX_PATCH + 1))
          VERSION="${MAJOR}.${MINOR}.${PATCH}"
          while echo "$USED_VERSIONS" | grep -qxF "$VERSION"; do
            echo "⚠️  v${VERSION} still used (tag or crates.io); bumping patch..."
            PATCH=$((PATCH + 1))
            VERSION="${MAJOR}.${MINOR}.${PATCH}"
          done
          echo "✅ v${VERSION} is free"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.skip_tests }}" = "true" ]; then
            VERSION_TAG="v${VERSION}-unverified"
          else
            VERSION_TAG="v${VERSION}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "version_tag=${VERSION_TAG}" >> $GITHUB_OUTPUT
          echo "✅ Releasing: ${VERSION_TAG}"

      - name: Bump Cargo.toml version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          awk -v ver="$VERSION" '
            BEGIN { in_package = 0 }
            /^\[package\]/ { in_package = 1; print; next }
            in_package && /^\[/ { in_package = 0 }
            in_package && /^version = / { print "version = \"" ver "\""; next }
            { print }
          ' Cargo.toml > Cargo.toml.tmp && mv Cargo.toml.tmp Cargo.toml
          ACTUAL=$(grep -A 5 '^\[package\]' Cargo.toml | grep '^version = ' | head -1 | sed -E 's/^version = "([^"]+)".*/\1/')
          [ "$ACTUAL" = "$VERSION" ] || { echo "❌ Version bump failed"; exit 1; }
          echo "✅ Cargo.toml bumped to ${VERSION}"

      - name: Install packaging tools and cross-compilers
        run: |
          if command -v apt-get >/dev/null 2>&1; then
            bash scripts/apt-get-retry.sh update -qq
            bash scripts/apt-get-retry.sh install -y -qq \
              gcc-mingw-w64-x86-64 binutils-mingw-w64-x86-64 \
              gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu \
              rpm dpkg-dev fakeroot zip alien || true
          elif command -v pacman >/dev/null 2>&1; then
            pacman -Qq mingw-w64-gcc aarch64-linux-gnu-gcc >/dev/null 2>&1 || \
              sudo pacman -Sy --noconfirm --needed mingw-w64-gcc aarch64-linux-gnu-gcc aarch64-linux-gnu-binutils
          fi
          # Self-hosted Arch runners: install zip, dpkg, fakeroot, mingw-w64-* on the host
          # (not here) so collect-artifacts, package-deb.sh, and cross-compile work.
          export PATH="$HOME/.cargo/bin:$PATH"
          cargo install cargo-deb --locked --quiet || true
          cargo install cargo-generate-rpm --locked --quiet || true
          rustup target add x86_64-pc-windows-gnu aarch64-unknown-linux-gnu

      - name: Build Linux x86_64 release binary
        id: build_linux
        env:
          CARGO_BUILD_JOBS: 8
        run: |
          export CARGO_TARGET_DIR=/tmp/gh-blvm-release-build/${{ github.run_id }}/target
          unset CC CXX CPP AR || true
          cargo build --release
          VERSION="${{ steps.version.outputs.version }}"
          cp /tmp/gh-blvm-release-build/${{ github.run_id }}/target/release/blvm ./blvm-${VERSION}-linux-x86_64
          echo "✅ Linux binary: $(file blvm-${VERSION}-linux-x86_64)"
          echo "filename=blvm-${VERSION}-linux-x86_64" >> $GITHUB_OUTPUT

      - name: Build Windows x86_64 release binary
        id: build_windows
        env:
          CARGO_TARGET_X86_64_PC_WINDOWS_GNU_LINKER: x86_64-w64-mingw32-gcc
          CC_x86_64_pc_windows_gnu: x86_64-w64-mingw32-gcc
          CXX_x86_64_pc_windows_gnu: x86_64-w64-mingw32-g++
          PKG_CONFIG_ALLOW_CROSS: "1"
          CARGO_BUILD_JOBS: 8
        run: |
          unset CC CXX CPP AR || true
          export CARGO_TARGET_DIR=/tmp/gh-blvm-release-build/${{ github.run_id }}/target
          VERSION="${{ steps.version.outputs.version }}"
          echo "=== Windows cross-compile (pure-Rust features, no zmq/rocksdb/nix/libc) ==="
          cargo build --release \
            --target x86_64-pc-windows-gnu \
            --no-default-features \
            --features "blvm-node/sled,blvm-node/redb,blvm-node/production,blvm-node/protocol-verification,blvm-node/utxo-commitments" \
            2>&1 || { echo "❌ Windows cross-compile failed (see above)"; exit 1; }
          EXE=/tmp/gh-blvm-release-build/${{ github.run_id }}/target/x86_64-pc-windows-gnu/release/blvm.exe
          if [ -f "$EXE" ]; then
            cp "$EXE" ./blvm-${VERSION}-windows-x86_64.exe
            echo "✅ Windows binary: $(ls -lh blvm-${VERSION}-windows-x86_64.exe)"
            echo "built=true" >> $GITHUB_OUTPUT
            echo "filename=blvm-${VERSION}-windows-x86_64.exe" >> $GITHUB_OUTPUT
          else
            echo "❌ .exe not found after build"
            echo "built=false" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Build Linux aarch64 release binary (Raspberry Pi 64-bit)
        id: build_aarch64
        env:
          CARGO_BUILD_JOBS: 8
        run: |
          chmod +x scripts/ci-build-aarch64.sh
          export CARGO_TARGET_DIR=/tmp/gh-blvm-release-build/${{ github.run_id }}/target
          scripts/ci-build-aarch64.sh "$CARGO_TARGET_DIR" "${{ steps.version.outputs.version }}"

      # Linux .tar.gz + Windows .zip (base), SHA256SUMS-blvm-*, RELEASE_NOTES.md,
      # Arch-style .pkg.tar.gz; SHA256SUMS-linux-packages.txt filled when staging.
      - name: Collect distribution bundles (tarballs, Arch pkg)
        env:
          GITHUB_WORKSPACE: ${{ github.workspace }}
          VERSION: ${{ steps.version.outputs.version }}
          VERSION_TAG: ${{ steps.version.outputs.version_tag }}
          CARGO_TARGET_DIR: /tmp/gh-blvm-release-build/${{ github.run_id }}/target
        run: |
          chmod +x scripts/ci-release-extra-artifacts.sh
          bash scripts/ci-release-extra-artifacts.sh

      - name: Package .deb (Debian/Ubuntu)
        id: build_deb
        continue-on-error: true
        run: |
          TARGET_DIR=/tmp/gh-blvm-release-build/${{ github.run_id }}/target
          VERSION="${{ steps.version.outputs.version }}"
          # cargo deb --no-build resolves asset paths relative to workspace root (./target/release/blvm).
          # Copy the already-built binary there so it can find it.
          mkdir -p target/release
          cp "${TARGET_DIR}/release/blvm" target/release/blvm
          cargo deb --no-build 2>&1
          DEB=$(find target/debian -name "*.deb" 2>/dev/null | head -1)
          if [ -n "$DEB" ]; then
            DEBNAME="blvm_${VERSION}_amd64.deb"
            cp "$DEB" "./${DEBNAME}"
            echo "✅ .deb: ${DEBNAME}"
            echo "built=true" >> $GITHUB_OUTPUT
            echo "filename=${DEBNAME}" >> $GITHUB_OUTPUT
          else
            echo "⚠️  .deb not produced"
            echo "built=false" >> $GITHUB_OUTPUT
          fi

      - name: Package .rpm (RHEL/Fedora)
        id: build_rpm
        continue-on-error: true
        run: |
          export CARGO_TARGET_DIR=/tmp/gh-blvm-release-build/${{ github.run_id }}/target
          VERSION="${{ steps.version.outputs.version }}"
          cargo generate-rpm --target-dir /tmp/gh-blvm-release-build/${{ github.run_id }}/target 2>&1
          RPM=$(find /tmp/gh-blvm-release-build/${{ github.run_id }}/target -name "*.rpm" | head -1)
          if [ -n "$RPM" ]; then
            RPMNAME="blvm-${VERSION}-1.x86_64.rpm"
            cp "$RPM" "./${RPMNAME}"
            echo "✅ .rpm: ${RPMNAME}"
            echo "built=true" >> $GITHUB_OUTPUT
            echo "filename=${RPMNAME}" >> $GITHUB_OUTPUT
          else
            echo "⚠️  .rpm not produced"
            echo "built=false" >> $GITHUB_OUTPUT
          fi

      - name: Stage release artifacts and checksums
        id: checksums
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          VERSION_TAG="${{ steps.version.outputs.version_tag }}"
          mkdir -p release-artifacts
          # Required release binaries (fail if aarch64 cross-build did not produce output)
          for f in \
            "blvm-${VERSION}-linux-x86_64" \
            "blvm-${VERSION}-linux-aarch64" \
            "blvm-${VERSION}-windows-x86_64.exe"; do
            if [ ! -f "$f" ]; then
              echo "::error::Missing required release binary: $f"
              exit 1
            fi
            cp "$f" release-artifacts/
          done
          for f in \
            blvm_${VERSION}_amd64.deb \
            blvm-${VERSION}-1.x86_64.rpm; do
            [ -f "$f" ] && cp "$f" release-artifacts/
          done
          if [ -d artifacts ]; then
            cp -a artifacts/. release-artifacts/
          fi
          # Archives from collect-artifacts + create-release.sh (uploaded via files: release-artifacts/*)
          for f in \
            "blvm-${VERSION_TAG}-linux-x86_64.tar.gz" \
            "blvm-${VERSION_TAG}-linux-aarch64.tar.gz" \
            "blvm-${VERSION_TAG}-windows-x86_64.zip"; do
            if [ ! -f "release-artifacts/${f}" ]; then
              echo "::error::Missing required release archive: ${f} (check collect-artifacts / create-release.sh)"
              exit 1
            fi
          done
          # After cargo deb / generate-rpm: all Linux packages live in release-artifacts
          (
            cd release-artifacts
            : > SHA256SUMS-linux-packages.txt
            shopt -s nullglob
            for f in ./*.deb ./*.rpm ./*.pkg.tar.gz; do
              sha256sum "$f" >> SHA256SUMS-linux-packages.txt || true
            done
          )
          ( cd release-artifacts && sha256sum * | LC_ALL=C sort > ../checksums.sha256 )
          cp checksums.sha256 release-artifacts/
          echo "=== checksums.sha256 (all uploaded files) ==="
          cat checksums.sha256
          echo "=== staged artifacts ==="
          ls -lh release-artifacts/

      - name: Create and push version tag
        run: |
          VERSION_TAG="${{ steps.version.outputs.version_tag }}"
          git config user.email "ci@btcdecoded.com"
          git config user.name "BLVM CI"
          if git rev-parse "$VERSION_TAG" >/dev/null 2>&1; then
            echo "⚠️  Tag ${VERSION_TAG} already exists, skipping"
          else
            git tag -a "$VERSION_TAG" -m "Release ${VERSION_TAG}"
            git push origin "$VERSION_TAG"
            echo "✅ Created and pushed tag ${VERSION_TAG}"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.version_tag }}
          name: blvm ${{ steps.version.outputs.version_tag }}
          body: |
            **Bitcoin Commons BLVM** — Bitcoin Low-Level Virtual Machine node CLI.

            > [!NOTE]
            > Verify your download against `checksums.sha256` before running.

            ## Downloads

            | Platform | File | Notes |
            |---|---|---|
            | **Linux x86_64** (binary) | `blvm-${{ steps.version.outputs.version }}-linux-x86_64` | Full features (default `cargo build`) |
            | **Linux aarch64** (binary) | `blvm-${{ steps.version.outputs.version }}-linux-aarch64` | Raspberry Pi 4/5 (64-bit OS); portable cross-build (sled/redb) |
            | **Linux x86_64** (tarball) | `blvm-${{ steps.version.outputs.version_tag }}-linux-x86_64.tar.gz` | `blvm` + governance CLIs (+ checksum file inside) |
            | **Linux aarch64** (tarball) | `blvm-${{ steps.version.outputs.version_tag }}-linux-aarch64.tar.gz` | `blvm` for 64-bit ARM Linux (+ checksum file inside) |
            | **Linux x86_64** (Arch / pacman) | `blvm-${{ steps.version.outputs.version }}-x86_64.pkg.tar.gz` | `pacman -U` |
            | **Linux x86_64** (Debian/Ubuntu) | `blvm_${{ steps.version.outputs.version }}_amd64.deb` | `cargo deb` (matches standalone binary) |
            | **Linux x86_64** (RHEL/Fedora) | `blvm-${{ steps.version.outputs.version }}-1.x86_64.rpm` | `cargo generate-rpm` |
            | **Windows x86_64** | `blvm-${{ steps.version.outputs.version }}-windows-x86_64.exe` | Portable Windows build |
            | **Windows x86_64** (zip) | `blvm-${{ steps.version.outputs.version_tag }}-windows-x86_64.zip` | Same as .exe in archive form |
            | **Checksums** | `checksums.sha256`, `SHA256SUMS-blvm-*`, `SHA256SUMS-linux-packages.txt` | Verify downloads |

            ## Verify

            ```bash
            sha256sum -c checksums.sha256
            ```

            ## Install

            **Linux (single binary):**
            ```bash
            curl -LO https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.version_tag }}/blvm-${{ steps.version.outputs.version }}-linux-x86_64
            curl -LO https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.version_tag }}/checksums.sha256
            sha256sum -c checksums.sha256
            chmod +x blvm-${{ steps.version.outputs.version }}-linux-x86_64
            sudo mv blvm-${{ steps.version.outputs.version }}-linux-x86_64 /usr/local/bin/blvm
            ```

            **Linux aarch64 (Raspberry Pi 4/5, 64-bit OS):**
            ```bash
            curl -LO https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.version_tag }}/blvm-${{ steps.version.outputs.version }}-linux-aarch64
            curl -LO https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.version_tag }}/checksums.sha256
            sha256sum -c checksums.sha256
            chmod +x blvm-${{ steps.version.outputs.version }}-linux-aarch64
            sudo mv blvm-${{ steps.version.outputs.version }}-linux-aarch64 /usr/local/bin/blvm
            ```

            **Linux (tarball):**
            ```bash
            curl -LO https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.version_tag }}/blvm-${{ steps.version.outputs.version_tag }}-linux-x86_64.tar.gz
            tar -xzf blvm-${{ steps.version.outputs.version_tag }}-linux-x86_64.tar.gz
            sudo mv blvm /usr/local/bin/
            ```

            **Linux aarch64 (tarball, Raspberry Pi 4/5):**
            ```bash
            curl -LO https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.version_tag }}/blvm-${{ steps.version.outputs.version_tag }}-linux-aarch64.tar.gz
            tar -xzf blvm-${{ steps.version.outputs.version_tag }}-linux-aarch64.tar.gz
            sudo mv blvm /usr/local/bin/
            ```

            **Debian/Ubuntu:**
            ```bash
            curl -LO https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.version_tag }}/blvm_${{ steps.version.outputs.version }}_amd64.deb
            sudo dpkg -i blvm_${{ steps.version.outputs.version }}_amd64.deb
            ```

            **RHEL/Fedora:**
            ```bash
            curl -LO https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.version_tag }}/blvm-${{ steps.version.outputs.version }}-1.x86_64.rpm
            sudo rpm -i blvm-${{ steps.version.outputs.version }}-1.x86_64.rpm
            ```

            **Windows:** Download `blvm-${{ steps.version.outputs.version }}-windows-x86_64.exe`, verify checksum, and run from a terminal.

            ## Changes

            See [commit history](https://github.com/${{ github.repository }}/compare/${{ github.event.before }}...${{ github.sha }})
          files: release-artifacts/*
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version_tag, '-unverified') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup release build dir
        if: always()
        run: rm -rf /tmp/gh-blvm-release-build/${{ github.run_id }} || true

  # Sends repository_dispatch(blvm-release) to BTCDecoded/website and
  # BTCDecoded/commons-website so both refresh install/blvm version metadata.
  # Org secret on this repo: WEBSITE_REPO_DISPATCH_TOKEN — PAT must be able to
  # dispatch workflows on both repos (classic `repo` or fine-grained on each).
  notify-website-deploy:
    name: Dispatch marketing site rebuilds
    needs: release
    runs-on: ubuntu-latest
    if: ${{ always() && needs.release.result == 'success' }}
    steps:
      - name: repository_dispatch(blvm-release) → website & commons-website
        env:
          TOKEN: ${{ secrets.WEBSITE_REPO_DISPATCH_TOKEN }}
          VERSION_TAG: ${{ needs.release.outputs.version_tag }}
          SOURCE_REPO: ${{ github.repository }}
        run: |
          if [ -z "${TOKEN:-}" ]; then
            echo "::notice::WEBSITE_REPO_DISPATCH_TOKEN is not set — skipping marketing site dispatch."
            exit 0
          fi
          BODY=$(jq -nc --arg t "${VERSION_TAG}" --arg r "${SOURCE_REPO}" \
            '{"event_type":"blvm-release","client_payload":{"tag":$t,"source_repo":$r}}')
          for REPO in website commons-website; do
            echo "Dispatching blvm-release → BTCDecoded/${REPO} …"
            curl -fsSL -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/BTCDecoded/${REPO}/dispatches" \
              -d "${BODY}"
          done

  # develop: publish coordinated dev set when possible; nightly uses =V or falls back to main/stable crates.
  publish-develop-set:
    name: Publish / verify develop crate set
    needs: [setup, build, test, clippy, fmt, docs, security]
    runs-on: [self-hosted, Linux, X64, builds]
    outputs:
      version: ${{ steps.ensure.outputs.version }}
      based_on_stable: ${{ steps.ensure.outputs.based_on_stable }}
      use_develop: ${{ steps.ensure.outputs.use_develop }}
    if: |
      always() &&
      needs.setup.result == 'success' &&
      needs.build.result == 'success' &&
      (github.ref == 'refs/heads/develop' ||
        (github.event_name == 'repository_dispatch' && github.event.action == 'develop-chain')) &&
      (github.event_name == 'push' || github.event_name == 'repository_dispatch' || github.event_name == 'workflow_dispatch') &&
      !contains(needs.setup.outputs.commit_msg_bundle, '[skip_release]') &&
      (github.event.head_commit == null || !contains(github.event.head_commit.message, '[skip_release]')) &&
      !contains(needs.setup.outputs.commit_msg_bundle, '[skip_publish_dev]') &&
      (github.event.head_commit == null || !contains(github.event.head_commit.message, '[skip_publish_dev]')) &&
      (github.event_name != 'workflow_dispatch' || github.event.inputs.skip_publish_dev != 'true') &&
      ((github.event_name == 'workflow_dispatch' && github.event.inputs.skip_tests == 'true') ||
       (
         (needs.test.result == 'success' || (needs.test.result == 'skipped' && (contains(needs.setup.outputs.commit_msg_bundle, '[skip_tests]') || (github.event.head_commit != null && contains(github.event.head_commit.message, '[skip_tests]'))))) &&
         (needs.clippy.result == 'success' || (needs.clippy.result == 'skipped' && (contains(needs.setup.outputs.commit_msg_bundle, '[skip_docs]') || contains(needs.setup.outputs.commit_msg_bundle, '[skip_tests]') || (github.event.head_commit != null && (contains(github.event.head_commit.message, '[skip_docs]') || contains(github.event.head_commit.message, '[skip_tests]')))))) &&
         (needs.fmt.result == 'success' || (needs.fmt.result == 'skipped' && (contains(needs.setup.outputs.commit_msg_bundle, '[skip_docs]') || contains(needs.setup.outputs.commit_msg_bundle, '[skip_tests]') || (github.event.head_commit != null && (contains(github.event.head_commit.message, '[skip_docs]') || contains(github.event.head_commit.message, '[skip_tests]')))))) &&
         (needs.docs.result == 'success' || (needs.docs.result == 'skipped' && (contains(needs.setup.outputs.commit_msg_bundle, '[skip_docs]') || contains(needs.setup.outputs.commit_msg_bundle, '[skip_tests]') || (github.event.head_commit != null && (contains(github.event.head_commit.message, '[skip_docs]') || contains(github.event.head_commit.message, '[skip_tests]')))))) &&
         (needs.security.result == 'success' || (needs.security.result == 'skipped' && (contains(needs.setup.outputs.commit_msg_bundle, '[skip_security]') || contains(needs.setup.outputs.commit_msg_bundle, '[skip_tests]') || (github.event.head_commit != null && (contains(github.event.head_commit.message, '[skip_security]') || contains(github.event.head_commit.message, '[skip_tests]'))))))
       ))
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - name: Strip [patch.crates-io] for crates.io-only CI
        uses: BTCDecoded/rust-ci/strip-patch-crates-io@main

      - name: Ensure develop crate set on registry
        id: ensure
        env:
          FORCE_VERSION: ${{ github.event.inputs.force_version }}
        run: |
          chmod +x scripts/*.sh scripts/*.py
          if [ -n "${FORCE_VERSION}" ]; then
            eval "$(bash scripts/compute-develop-version.sh --force-version "${FORCE_VERSION}" --emit-shell)"
          elif [ "${{ github.event_name }}" = "repository_dispatch" ] && [ -n "${{ github.event.client_payload.version }}" ]; then
            V="${{ github.event.client_payload.version }}"
            DEVELOP_BASED_ON_STABLE=""
            DEVELOP_PREFIX="$(echo "${V}" | sed -E 's/\.[0-9]+$//')"
          else
            eval "$(bash scripts/compute-develop-version.sh --emit-shell)"
          fi
          V="${DEVELOP_VERSION:-${V}}"
          echo "based_on_stable=${DEVELOP_BASED_ON_STABLE:-}" >> "$GITHUB_OUTPUT"
          echo "Coordinated develop version: ${V}"

          publish_sibling() {
            local dir="$1" wait="$2" sdk="${3:-0}"
            [ -d "${dir}/Cargo.toml" ] || return 0
            if [ -z "${CARGO_REGISTRY_TOKEN:-}" ]; then return 0; fi
            if [ "${sdk}" = "1" ]; then
              (cd "${dir}" && bash "${GITHUB_WORKSPACE}/scripts/ci-publish-develop-sdk.sh" \
                --scripts-dir "${GITHUB_WORKSPACE}/scripts" \
                --wait-for "${wait}" \
                "${V}")
            else
              (cd "${dir}" && bash "${GITHUB_WORKSPACE}/scripts/ci-publish-develop.sh" \
                --scripts-dir "${GITHUB_WORKSPACE}/scripts" \
                ${wait:+--wait-for "$wait"} \
                "${V}")
            fi
          }

          if [ -n "${CARGO_REGISTRY_TOKEN:-}" ]; then
            cargo login "${CARGO_REGISTRY_TOKEN}"
            publish_sibling ../blvm-consensus "" 0
            publish_sibling ../blvm-protocol blvm-consensus 0
            publish_sibling ../blvm-node blvm-consensus,blvm-protocol 0
            publish_sibling ../blvm-sdk blvm-node 1
          else
            echo "::notice::CARGO_REGISTRY_TOKEN not set — only verifying index, not publishing siblings"
          fi

          eval "$(bash scripts/ci-wait-develop-set.sh "${V}" --allow-stable-fallback --emit-shell)"
          echo "use_develop=${USE_DEVELOP}" >> "$GITHUB_OUTPUT"
          if [ "${USE_DEVELOP}" -eq 1 ]; then
            echo "version=${V}" >> "$GITHUB_OUTPUT"
          else
            echo "version=" >> "$GITHUB_OUTPUT"
          fi

      - name: Update versions.toml develop metadata
        if: steps.ensure.outputs.use_develop == '1'
        run: |
          python3 scripts/update-versions-develop-metadata.py \
            --version "${{ steps.ensure.outputs.version }}" \
            --based-on-stable "${{ steps.ensure.outputs.based_on_stable }}" \
            --versions-toml versions.toml \
            --git-sha "${{ github.sha }}"

      - name: Commit versions.toml develop metadata
        if: steps.ensure.outputs.use_develop == '1'
        env:
          REPO_ACCESS_TOKEN: ${{ secrets.REPO_ACCESS_TOKEN }}
        run: |
          if [ -z "${REPO_ACCESS_TOKEN:-}" ]; then
            echo "REPO_ACCESS_TOKEN not set — skipping versions.toml push"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add versions.toml
          if git diff --staged --quiet; then
            echo "No versions.toml changes"
            exit 0
          fi
          git commit -m "chore(develop): record ${{ steps.ensure.outputs.version }} in versions.toml [skip ci]"
          git remote set-url origin "https://${REPO_ACCESS_TOKEN}@github.com/${{ github.repository }}.git"
          git push origin "HEAD:${{ github.ref_name }}"

  # develop only: rolling Linux + Windows binaries + GHCR :nightly (no crates.io, no semver tags).
  nightly-release:
    name: Nightly Release (develop)
    needs: [setup, build, test, clippy, fmt, docs, security, publish-develop-set]
    runs-on: [self-hosted, Linux, X64, builds]
    permissions:
      contents: write
    if: |
      always() &&
      needs.setup.result == 'success' &&
      needs.build.result == 'success' &&
      (needs.publish-develop-set.result == 'success' || needs.publish-develop-set.result == 'skipped') &&
      (github.ref == 'refs/heads/develop' ||
        (github.event_name == 'repository_dispatch' && github.event.action == 'develop-chain')) &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch' || github.event_name == 'repository_dispatch') &&
      (github.event_name != 'push' || github.event.head_commit == null ||
       (!contains(github.event.head_commit.message, '[skip ci]') &&
        !contains(github.event.head_commit.message, '[ci skip]') &&
        !contains(github.event.head_commit.message, '[no ci]'))) &&
      !contains(needs.setup.outputs.commit_msg_bundle, '[skip ci]') &&
      (github.event.head_commit == null || !contains(github.event.head_commit.message, '[skip ci]')) &&
      !contains(needs.setup.outputs.commit_msg_bundle, '[ci skip]') &&
      (github.event.head_commit == null || !contains(github.event.head_commit.message, '[ci skip]')) &&
      !contains(needs.setup.outputs.commit_msg_bundle, '[no ci]') &&
      (github.event.head_commit == null || !contains(github.event.head_commit.message, '[no ci]')) &&
      !contains(needs.setup.outputs.commit_msg_bundle, '[skip_release]') &&
      (github.event.head_commit == null || !contains(github.event.head_commit.message, '[skip_release]')) &&
      ((github.event_name == 'workflow_dispatch' && github.event.inputs.skip_tests == 'true') ||
       (
         (needs.test.result == 'success' || (needs.test.result == 'skipped' && (contains(needs.setup.outputs.commit_msg_bundle, '[skip_tests]') || (github.event.head_commit != null && contains(github.event.head_commit.message, '[skip_tests]'))))) &&
         (needs.clippy.result == 'success' || (needs.clippy.result == 'skipped' && (contains(needs.setup.outputs.commit_msg_bundle, '[skip_docs]') || contains(needs.setup.outputs.commit_msg_bundle, '[skip_tests]') || (github.event.head_commit != null && (contains(github.event.head_commit.message, '[skip_docs]') || contains(github.event.head_commit.message, '[skip_tests]')))))) &&
         (needs.fmt.result == 'success' || (needs.fmt.result == 'skipped' && (contains(needs.setup.outputs.commit_msg_bundle, '[skip_docs]') || contains(needs.setup.outputs.commit_msg_bundle, '[skip_tests]') || (github.event.head_commit != null && (contains(github.event.head_commit.message, '[skip_docs]') || contains(github.event.head_commit.message, '[skip_tests]')))))) &&
         (needs.docs.result == 'success' || (needs.docs.result == 'skipped' && (contains(needs.setup.outputs.commit_msg_bundle, '[skip_docs]') || contains(needs.setup.outputs.commit_msg_bundle, '[skip_tests]') || (github.event.head_commit != null && (contains(github.event.head_commit.message, '[skip_docs]') || contains(github.event.head_commit.message, '[skip_tests]')))))) &&
         (needs.security.result == 'success' || (needs.security.result == 'skipped' && (contains(needs.setup.outputs.commit_msg_bundle, '[skip_security]') || contains(needs.setup.outputs.commit_msg_bundle, '[skip_tests]') || (github.event.head_commit != null && (contains(github.event.head_commit.message, '[skip_security]') || contains(github.event.head_commit.message, '[skip_tests]'))))))
       ))
    env:
      CARGO_NIGHTLY_TARGET: /tmp/gh-blvm-nightly-build/${{ github.run_id }}/target
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Strip [patch.crates-io] for crates.io-only CI
        uses: BTCDecoded/rust-ci/strip-patch-crates-io@main

      - name: Clean leftover path overrides
        run: |
          if [ -d "../blvm-node" ]; then rm -rf ../blvm-node; fi
          if [ -d "../blvm-protocol" ]; then rm -rf ../blvm-protocol; fi
          if [ -d "../blvm-consensus" ]; then rm -rf ../blvm-consensus; fi
          if [ -f ".cargo/config.toml" ]; then rm -f .cargo/config.toml; fi

      - name: Install OpenSSL, packaging tools, and Windows cross-compiler
        run: |
          if command -v apt-get >/dev/null 2>&1; then
            bash scripts/apt-get-retry.sh update -qq
            bash scripts/apt-get-retry.sh install -y -qq pkg-config libssl-dev \
              gcc-mingw-w64-x86-64 binutils-mingw-w64-x86-64 \
              dpkg-dev fakeroot rpm zip || true
          elif command -v pacman >/dev/null 2>&1; then
            pacman -Qq openssl pkgconf dpkg fakeroot zip >/dev/null 2>&1 || \
              sudo pacman -Sy --noconfirm openssl pkgconf dpkg fakeroot zip
            pacman -Qq mingw-w64-gcc >/dev/null 2>&1 || \
              sudo pacman -Sy --noconfirm mingw-w64-gcc
          fi
          export PATH="$HOME/.cargo/bin:$PATH"
          cargo install cargo-deb --locked --quiet || true
          cargo install cargo-generate-rpm --locked --quiet || true
          rustup target add x86_64-pc-windows-gnu

      - name: Isolate CARGO_HOME for this runner
        run: |
          mkdir -p "${RUNNER_TEMP}/cargo"
          echo "CARGO_HOME=${RUNNER_TEMP}/cargo" >> "$GITHUB_ENV"

      - name: Cache
        uses: BTCDecoded/rust-ci/runner-cargo-cache@main
        with:
          operation: bind-env
          cache-key: ${{ needs.setup.outputs.cache-key }}

      - name: Restore Cargo cache
        uses: BTCDecoded/rust-ci/runner-cargo-cache@main
        with:
          operation: restore

      - name: Install Rust
        uses: BTCDecoded/rust-ci/install-rust-toolchain@main

      - name: Resolve develop version for nightly
        id: nightly_v
        env:
          FORCE_VERSION: ${{ github.event.inputs.force_version }}
        run: |
          chmod +x scripts/*.sh
          USE_DEVELOP="${{ needs.publish-develop-set.outputs.use_develop }}"
          if [ "${USE_DEVELOP}" = "1" ] && [ -n "${{ needs.publish-develop-set.outputs.version }}" ]; then
            V="${{ needs.publish-develop-set.outputs.version }}"
            echo "use_develop=1" >> "$GITHUB_OUTPUT"
          elif [ -n "${FORCE_VERSION}" ]; then
            V=$(bash scripts/compute-develop-version.sh --force-version "${FORCE_VERSION}")
            echo "use_develop=0" >> "$GITHUB_OUTPUT"
          else
            V=$(bash scripts/compute-develop-version.sh)
            echo "use_develop=0" >> "$GITHUB_OUTPUT"
          fi
          echo "version=${V}" >> "$GITHUB_OUTPUT"

      - name: Pin crate deps for nightly binary
        run: |
          chmod +x scripts/resolve-develop-registry-deps.sh scripts/resolve-develop-registry-deps.py
          if [ "${{ steps.nightly_v.outputs.use_develop }}" = "1" ]; then
            V="${{ steps.nightly_v.outputs.version }}"
            bash scripts/resolve-develop-registry-deps.sh --mode publish --version "${V}" Cargo.toml
          else
            bash scripts/resolve-develop-registry-deps.sh --mode stable Cargo.toml
          fi

      - name: Verify dependency tree (develop)
        run: |
          if [ "${{ steps.nightly_v.outputs.use_develop }}" = "1" ]; then
            V="${{ steps.nightly_v.outputs.version }}"
            cargo tree -p blvm-node -i blvm-protocol 2>/dev/null | head -20
            cargo tree -p blvm-node -i blvm-consensus 2>/dev/null | head -20
            if ! cargo tree -p blvm-node 2>/dev/null | grep -q "${V}"; then
              echo "::warning::Expected develop version ${V} in dependency tree (continuing)"
            fi
          else
            echo "Using main/stable crates.io (develop pre-release set unavailable)"
            cargo tree -p blvm-node -i blvm-protocol 2>/dev/null | head -20
            cargo tree -p blvm-node -i blvm-consensus 2>/dev/null | head -20
          fi

      - name: Build Linux release binary
        env:
          CARGO_TARGET_DIR: ${{ env.CARGO_NIGHTLY_TARGET }}
          CARGO_BUILD_JOBS: 8
        run: |
          unset CC CXX CPP AR || true
          cargo build --release

      - name: Build Windows x86_64 release binary
        env:
          CARGO_TARGET_DIR: ${{ env.CARGO_NIGHTLY_TARGET }}
          CARGO_TARGET_X86_64_PC_WINDOWS_GNU_LINKER: x86_64-w64-mingw32-gcc
          CC_x86_64_pc_windows_gnu: x86_64-w64-mingw32-gcc
          CXX_x86_64_pc_windows_gnu: x86_64-w64-mingw32-g++
          PKG_CONFIG_ALLOW_CROSS: "1"
          CARGO_BUILD_JOBS: 8
        run: |
          unset CC CXX CPP AR || true
          echo "=== Windows cross-compile (same feature set as main release) ==="
          cargo build --release \
            --target x86_64-pc-windows-gnu \
            --no-default-features \
            --features "blvm-node/sled,blvm-node/redb,blvm-node/production,blvm-node/protocol-verification,blvm-node/utxo-commitments" \
            2>&1 || { echo "❌ Windows cross-compile failed"; exit 1; }
          EXE="${{ env.CARGO_NIGHTLY_TARGET }}/x86_64-pc-windows-gnu/release/blvm.exe"
          if [ ! -f "$EXE" ]; then
            echo "❌ .exe not found after build: $EXE"
            exit 1
          fi
          echo "✅ Windows binary: $(ls -lh "$EXE")"

      - name: Collect nightly artifacts (Linux + Windows)
        env:
          GITHUB_WORKSPACE: ${{ github.workspace }}
          GITHUB_SHA: ${{ github.sha }}
          CARGO_TARGET_DIR: ${{ env.CARGO_NIGHTLY_TARGET }}
        run: |
          chmod +x scripts/ci-nightly-artifacts.sh
          bash scripts/ci-nightly-artifacts.sh

      - name: Update nightly tag and GitHub prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.email "ci@btcdecoded.com"
          git config user.name "BLVM CI"
          git tag -f nightly "${GITHUB_SHA}"
          git push -f origin nightly

          BUILT_UTC="$(date -u +'%Y-%m-%d %H:%M UTC')"
          NOTES_FILE="$(mktemp)"
          if [ "${{ steps.nightly_v.outputs.use_develop }}" = "1" ]; then
            CRATES_LINE="| Develop crates | \`${{ steps.nightly_v.outputs.version }}\` (crates.io pre-releases) |"
          else
            CRATES_LINE="| Crates | main/stable from crates.io (develop pre-release set unavailable) |"
          fi
          {
            echo "**BLVM Nightly** — rolling prerelease from \`develop\`."
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "${CRATES_LINE}"
            echo "| Commit | \`${GITHUB_SHA}\` |"
            echo "| Built | ${BUILT_UTC} |"
            echo ""
            echo "Verify downloads with \`checksums.sha256\`."
            echo ""
            echo "Artifact names match stable releases with \`version=nightly\` (e.g. \`blvm-nightly-linux-x86_64\`, \`blvm_nightly_amd64.deb\`)."
            echo "Rolling tag \`nightly\` replaces file contents each push; names stay the same."
            echo ""
            echo "- \`checksums.sha256\`, \`SHA256SUMS-*\` as on stable releases"
            echo ""
            echo "Container: \`ghcr.io/${{ github.repository }}:nightly\`"
          } > "${NOTES_FILE}"

          if ! gh release view nightly >/dev/null 2>&1; then
            gh release create nightly \
              --target "${GITHUB_SHA}" \
              --title "BLVM Nightly" \
              --prerelease \
              --notes-file "${NOTES_FILE}"
          else
            gh release edit nightly \
              --target "${GITHUB_SHA}" \
              --prerelease \
              --notes-file "${NOTES_FILE}"
          fi

          gh release upload nightly release-artifacts/* --clobber

      - name: Cleanup nightly build dir
        if: always()
        run: rm -rf "${{ env.CARGO_NIGHTLY_TARGET }}" || true

  docker-ghcr-nightly:
    name: Publish container nightly (GHCR)
    needs: [setup, nightly-release]
    runs-on: [self-hosted, Linux, X64, builds]
    permissions:
      contents: read
      packages: write
    if: |
      always() &&
      needs.setup.result == 'success' &&
      needs.nightly-release.result == 'success' &&
      (github.ref == 'refs/heads/develop' ||
        (github.event_name == 'repository_dispatch' && github.event.action == 'develop-chain')) &&
      !contains(needs.setup.outputs.commit_msg_bundle, '[skip_docker]') &&
      (github.event.head_commit == null || !contains(github.event.head_commit.message, '[skip_docker]'))
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Strip [patch.crates-io] for crates.io-only build
        uses: BTCDecoded/rust-ci/strip-patch-crates-io@main

      - name: Regenerate Cargo.lock without path patches
        run: cargo generate-lockfile

      - name: Set GHCR image name (must be lowercase)
        id: ghcr
        run: |
          R='${{ github.repository }}'
          echo "image=ghcr.io/${R,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push nightly image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.ghcr.outputs.image }}:nightly
          labels: |
            org.opencontainers.image.source=${{ github.repositoryUrl }}
            org.opencontainers.image.revision=${{ github.sha }}

  docker-ghcr:
    name: Publish container (GHCR)
    needs: [setup, release]
    runs-on: [self-hosted, Linux, X64, builds]
    permissions:
      contents: read
      packages: write
    # Any successful `release` job (push, manual workflow_dispatch, etc.): publish image.
    # Do not gate on `github.event_name == 'push'` — that skipped GHCR on manual runs.
    if: |
      always() &&
      needs.setup.result == 'success' &&
      needs.release.result == 'success' &&
      !contains(needs.setup.outputs.commit_msg_bundle, '[skip_docker]') &&
      (github.event.head_commit == null || !contains(github.event.head_commit.message, '[skip_docker]'))
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release.outputs.version_tag }}
          fetch-depth: 0

      - name: Strip [patch.crates-io] for crates.io-only build (matches CI)
        uses: BTCDecoded/rust-ci/strip-patch-crates-io@main

      - name: Regenerate Cargo.lock without path patches
        run: cargo generate-lockfile

      - name: Set GHCR image name (must be lowercase)
        id: ghcr
        run: |
          R='${{ github.repository }}'
          echo "image=ghcr.io/${R,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.ghcr.outputs.image }}
          tags: |
            type=raw,value=${{ needs.release.outputs.version }}
            type=raw,value=latest,enable=${{ !contains(needs.release.outputs.version_tag, 'unverified') }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  teardown:
    name: Teardown (cleanup runner disk)
    runs-on: [self-hosted, Linux, X64, builds]
    if: always()
    needs:
      - setup
      - test
      - clippy
      - fmt
      - docs
      - security
      - build
    steps:
      - name: Delete this run CI target dir
        run: |
          RUN_DIR="/tmp/gh-blvm-build/${{ github.run_id }}"
          if [ -d "$RUN_DIR" ]; then
            echo "Removing $RUN_DIR ($(du -sh "$RUN_DIR" 2>/dev/null | cut -f1))"
            rm -rf "$RUN_DIR"
          fi
          find /tmp/gh-blvm-build -mindepth 1 -maxdepth 1 -type d \
            -exec rm -rf {} + 2>/dev/null || true
          echo "=== disk after teardown ==="
          df -h /
